            <div>🗓️ <strong>분기별추이</strong> — 분기 단위 실적 추이</div>
            <div>📊 <strong>연도별추이</strong> — 연도 단위 누적 실적</div>
            <div>✅ <strong>동의기록</strong> / 📋 <strong>활동기록</strong> / 📝 <strong>계약기록</strong> — 원본 데이터</div>
        </div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
            ⚠️ 데이터는 이 브라우저에만 저장됩니다. 정기적으로 내보내기 해두세요.
        </div>
    </div>`;
}

function doExport(mf) {
    const um      = uMap();
    const members = sfpList();
    const f       = d => !mf || d.date?.startsWith(mf);
    const wb      = XLSX.utils.book_new();
    const label   = mf ? mf.replace('-','년 ')+'월' : '전체';

    // ── 데이터 로드
    const cons  = load('sfp_contracts').filter(f);
    const acts  = load('sfp_activities').filter(f);
    const agrs  = load('sfp_consents').filter(f);

    // ── 최근 6개월 배열
    const months6 = Array.from({length:6}, (_,i) => {
        const d = new Date(today.getFullYear(), today.getMonth()-5+i, 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    });

    // ══════════════════════════════════════════
    // [1] 📊 통계 요약 시트
    // ══════════════════════════════════════════
    const summary = [
        ['선릉금융 SFP 팀 실적 보고서'],
        [`기준: ${label}   /   작성일: ${todayStr}`],
        [''],
        ['■ 전체 현황'],
        ['항목', '건수', '비고'],
        ['총 계약 건수', cons.length, ''],
        ['총 활동 건수', acts.length, ''],
        ['필수컨설팅 동의', agrs.length, ''],
        ['총 보험료 합계', cons.reduce((s,c)=>s+(c.premium||0),0), '원'],
        ['총 환산TP 합계', cons.reduce((s,c)=>s+(c.tp||0),0), ''],
        [''],
        ['■ 신인별 실적 요약'],
        ['이름', '계약', '활동', '동의', '총보험료(원)', '환산TP합계', '목표(건)', '달성률(%)'],
        ...members.map(m => {
            const mc = cons.filter(c=>c.userId===m.id);
            const rate = m.target>0 ? Math.round(mc.length/m.target*100) : '-';
            return [
                m.name,
                mc.length,
                acts.filter(a=>a.userId===m.id).length,
                agrs.filter(c=>c.userId===m.id).length,
                mc.reduce((s,c)=>s+(c.premium||0),0),
                mc.reduce((s,c)=>s+(c.tp||0),0),
                m.target,
                rate
            ];
        }),
        [''],
        ['■ 월별 추이 (최근 6개월)'],
        ['월', '계약', '활동', '동의'],
        ...months6.map(ym => [
            ym,
            load('sfp_contracts').filter(c=>c.date?.startsWith(ym)).length,
            load('sfp_activities').filter(a=>a.date?.startsWith(ym)).length,
            load('sfp_consents').filter(c=>c.date?.startsWith(ym)).length,
        ]),
        [''],
        ['■ 활동 유형별 건수'],
        ['유형', '건수', '비율(%)'],
        ...(() => {
            const t = {};
            acts.forEach(a => t[a.type]=(t[a.type]||0)+1);
            return Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v,acts.length?Math.round(v/acts.length*100):0]);
        })(),
        [''],
        ['■ 계약 종류별 건수'],
        ['종류', '건수', '비율(%)'],
        ...(() => {
            const t = {};
            cons.forEach(c => t[c.product]=(t[c.product]||0)+1);
            return Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v,cons.length?Math.round(v/cons.length*100):0]);
        })(),
        [''],
        ['■ 활동 결과별 건수'],
        ['결과', '건수', '비율(%)'],
        ...(() => {
            const t = {};
            acts.forEach(a => t[a.result]=(t[a.result]||0)+1);
            return Object.entries(t).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v,acts.length?Math.round(v/acts.length*100):0]);
        })(),
    ];
    const wsSummary = XLSX.utils.aoa_to_sheet(summary);
    wsSummary['!cols'] = [28,12,14,12,18,12,12].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, wsSummary, '📊통계요약');

    // ══════════════════════════════════════════
    // [2] 신인별 실적 (월별 상세)
    // ══════════════════════════════════════════
    const memberDetail = [
        ['신인별 × 월별 실적 상세'],
        ['이름', ...months6, '합계'],
        ...['계약','활동','동의'].map(type => {
            const key = type==='계약'?'sfp_contracts':type==='활동'?'sfp_activities':'sfp_consents';
            const data = load(key);
            return [
                '',
                ...[`[${type}]`],
                ...Array(months6.length + 1).fill(''),
            ];
        }).flat(),
    ];
    // 신인별 × 월별 계약/활동/동의
    const detailRows = [
        ['신인별 × 월별 실적 상세'],
        ['이름', '구분', ...months6, '합계'],
    ];
    members.forEach(m => {
        ['계약','활동','동의'].forEach(type => {
            const data = type==='계약'?cons:type==='활동'?acts:agrs;
            const mData = data.filter(d=>d.userId===m.id);
            const monthly = months6.map(ym => mData.filter(d=>d.date?.startsWith(ym)).length);
            detailRows.push([m.name, type, ...monthly, monthly.reduce((s,v)=>s+v,0)]);
        });
        detailRows.push(['','','','','','','','']);
    });
    const wsDetail = XLSX.utils.aoa_to_sheet(detailRows);
    wsDetail['!cols'] = [14,8,...months6.map(()=>({wch:10})),{wch:8}].map(w=>typeof w==='number'?{wch:w}:w);
    XLSX.utils.book_append_sheet(wb, wsDetail, '👥신인별실적');

    // ══════════════════════════════════════════
    // [3~5] 원본 데이터 시트
    // ══════════════════════════════════════════
    const rawSheets = {
        '✅동의기록': agrs.map(c=>({날짜:c.date, SFP:um[c.userId]||'', 고객명:c.client, 동의유형:c.type, 메모:c.note||''})),
        '📋활동기록': acts.map(a=>({날짜:a.date, SFP:um[a.userId]||'', 유형:a.type, 고객명:a.client||'', 결과:a.result, 메모:a.note||''})),
        '📝계약기록': cons.map(c=>({날짜:c.date, SFP:um[c.userId]||'', 고객명:c.client, 보험종류:c.product, 상품명:c.productName||'', 월보험료:c.premium||0, 환산TP:c.tp||0, 메모:c.note||''})),
    };
    Object.entries(rawSheets).forEach(([n,rows]) => {
        const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{데이터없음:''}]);
        if (rows.length) ws['!cols'] = Object.keys(rows[0]).map(k=>({wch:Math.max(k.length*2,12)}));
        XLSX.utils.book_append_sheet(wb, ws, n);
    });

    // ── 공통 유틸
    const allCons  = load('sfp_contracts');
    const allActs  = load('sfp_activities');
    const allAgrs  = load('sfp_consents');

    const getWeek = dateStr => {
        const d = new Date(dateStr);
        const jan1 = new Date(d.getFullYear(), 0, 1);
        return Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    };
    const getQuarter = dateStr => Math.ceil(parseInt(dateStr.slice(5,7)) / 3);
    const getYear    = dateStr => dateStr.slice(0,4);
    const getMonth   = dateStr => dateStr.slice(0,7);
    const getMonthWeek = dateStr => {
        const day = parseInt(dateStr.slice(8,10));
        return `${dateStr.slice(0,7)} ${Math.ceil(day/7)}주차`;
    };

    const periodStat = (data_c, data_a, data_g, keyFn, label) => {
        const periods = [...new Set([
            ...data_c.map(d=>keyFn(d.date)),
            ...data_a.map(d=>keyFn(d.date)),
            ...data_g.map(d=>keyFn(d.date)),
        ])].filter(Boolean).sort();
        return periods.map(p => ({
            [label]: p,
            계약건수: data_c.filter(d=>keyFn(d.date)===p).length,
            환산TP합계: data_c.filter(d=>keyFn(d.date)===p).reduce((s,c)=>s+(c.tp||0),0),
            총보험료: data_c.filter(d=>keyFn(d.date)===p).reduce((s,c)=>s+(c.premium||0),0),
            활동건수: data_a.filter(d=>keyFn(d.date)===p).length,
            동의건수: data_g.filter(d=>keyFn(d.date)===p).length,
        }));
    };

    // ══════════════════════════════════════════
    // [6] 👤 인원별 종합 현황
    // ══════════════════════════════════════════
    const memberReport = members.map(m => {
        const mc  = (mf ? cons : allCons).filter(c=>c.userId===m.id);
        const ma  = (mf ? acts : allActs).filter(a=>a.userId===m.id);
        const mag = (mf ? agrs : allAgrs).filter(c=>c.userId===m.id);
        const totalTp  = mc.reduce((s,c)=>s+(c.tp||0),0);
        const totalPm  = mc.reduce((s,c)=>s+(c.premium||0),0);
        const tpRate   = m.targetTp  > 0 ? Math.round(totalTp/m.targetTp*100)+'%' : '-';
        const actRate  = m.targetAct > 0 ? Math.round(ma.length/m.targetAct*100)+'%' : '-';
        return {
            이름: m.name,
            환산TP목표: m.targetTp||0,
            환산TP실적: totalTp,
            TP달성률: tpRate,
            활동목표: m.targetAct||0,
            활동건수: ma.length,
            활동달성률: actRate,
            동의건수: mag.length,
            계약건수: mc.length,
            총보험료: totalPm,
            주력상품: (() => {
                const t={};
                mc.forEach(c=>{t[c.product]=(t[c.product]||0)+1;});
                return Object.entries(t).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';
            })(),
        };
    });
    const wsMember = XLSX.utils.json_to_sheet(memberReport.length ? memberReport : [{데이터없음:''}]);
    if (memberReport.length) wsMember['!cols'] = Object.keys(memberReport[0]).map(k=>({wch:Math.max(k.length*2,14)}));
    XLSX.utils.book_append_sheet(wb, wsMember, '👤인원별종합');

    // ══════════════════════════════════════════
    // [7] 🔍 고객별 상세 리포트
    // ══════════════════════════════════════════
    const clientMap = {};
    const allConsData = mf ? cons : allCons;
    const allActData  = mf ? acts : allActs;
    const allAgrData  = mf ? agrs : allAgrs;

    // 고객 기준 통합
    [...allConsData, ...allActData, ...allAgrData].forEach(d => {
        const cl = d.client;
        const uid = d.userId;
        if (!cl) return;
        const key = uid+'__'+cl;
        if (!clientMap[key]) clientMap[key] = { sfp: um[uid]||'', 고객명: cl, userId: uid, cons:[], acts:[], agrs:[] };
    });
    allAgrData.forEach(d => { const k=d.userId+'__'+d.client; if(clientMap[k]) clientMap[k].agrs.push(d); });
    allActData.forEach(d => { const k=d.userId+'__'+(d.client||''); if(clientMap[k]) clientMap[k].acts.push(d); });
    allConsData.forEach(d => { const k=d.userId+'__'+d.client; if(clientMap[k]) clientMap[k].cons.push(d); });

    const clientReport = Object.values(clientMap)
        .sort((a,b) => a.sfp.localeCompare(b.sfp) || a.고객명.localeCompare(b.고객명))
        .map(c => ({
            SFP: c.sfp,
            고객명: c.고객명,
            동의수령: c.agrs.length > 0 ? '✓' : '-',
            활동건수: c.acts.length,
            최근미팅: c.acts.sort((a,b)=>b.date.localeCompare(a.date))[0]?.date||'-',
            계약건수: c.cons.length,
            계약상품: c.cons.map(c=>c.productName||c.product).join(', ')||'-',
            환산TP합계: c.cons.reduce((s,c)=>s+(c.tp||0),0),
            총보험료합계: c.cons.reduce((s,c)=>s+(c.premium||0),0),
            최근활동결과: c.acts.sort((a,b)=>b.date.localeCompare(a.date))[0]?.result||'-',
        }));
    const wsClient = XLSX.utils.json_to_sheet(clientReport.length ? clientReport : [{데이터없음:''}]);
    if (clientReport.length) wsClient['!cols'] = Object.keys(clientReport[0]).map(k=>({wch:Math.max(k.length*2,12)}));
    XLSX.utils.book_append_sheet(wb, wsClient, '🔍고객별상세');

    // ══════════════════════════════════════════
    // [8] 📅 주차별 추이
    // ══════════════════════════════════════════
    const weeklyData = periodStat(allCons, allActs, allAgrs, getMonthWeek, '주차');
    const wsWeekly = XLSX.utils.json_to_sheet(weeklyData.length ? weeklyData : [{데이터없음:''}]);
    if (weeklyData.length) wsWeekly['!cols'] = Object.keys(weeklyData[0]).map(k=>({wch:16}));
    XLSX.utils.book_append_sheet(wb, wsWeekly, '📅주차별추이');

    // ══════════════════════════════════════════
    // [9] 📆 월별 추이
    // ══════════════════════════════════════════
    const monthlyData = periodStat(allCons, allActs, allAgrs, getMonth, '월');
    const wsMonthly = XLSX.utils.json_to_sheet(monthlyData.length ? monthlyData : [{데이터없음:''}]);
    if (monthlyData.length) wsMonthly['!cols'] = Object.keys(monthlyData[0]).map(k=>({wch:16}));
    XLSX.utils.book_append_sheet(wb, wsMonthly, '📆월별추이');

    // ══════════════════════════════════════════
    // [10] 🗓️ 분기별 추이
    // ══════════════════════════════════════════
    const quarterlyData = periodStat(allCons, allActs, allAgrs,
        d => `${getYear(d)}년 ${getQuarter(d)}분기`, '분기');
    const wsQuarterly = XLSX.utils.json_to_sheet(quarterlyData.length ? quarterlyData : [{데이터없음:''}]);
    if (quarterlyData.length) wsQuarterly['!cols'] = Object.keys(quarterlyData[0]).map(k=>({wch:16}));
    XLSX.utils.book_append_sheet(wb, wsQuarterly, '🗓️분기별추이');

    // ══════════════════════════════════════════
    // [11] 📊 연도별 추이
    // ══════════════════════════════════════════
    const yearlyData = periodStat(allCons, allActs, allAgrs, getYear, '연도');
    const wsYearly = XLSX.utils.json_to_sheet(yearlyData.length ? yearlyData : [{데이터없음:''}]);
    if (yearlyData.length) wsYearly['!cols'] = Object.keys(yearlyData[0]).map(k=>({wch:16}));
    XLSX.utils.book_append_sheet(wb, wsYearly, '📊연도별추이');

    XLSX.writeFile(wb, `SFP팀보고서_${mf||'전체'}.xlsx`);
    alert(`📊 "SFP팀보고서_${mf||'전체'}.xlsx" 다운로드 시작!\n총 11개 시트`);
}

function pgMyStats(el) {
    const me = currentUser;
    const freshMe   = load('sfp_users').find(u => u.id === me.id) || me;
    const mc        = load('sfp_contracts').filter(c=>c.userId===me.id&&c.date?.startsWith(thisYM));
    const ms        = load('sfp_consents').filter(c=>c.userId===me.id&&c.date?.startsWith(thisYM));

    const totalTp   = mc.reduce((s,c)=>s+(c.tp||0),0);
    const pm        = mc.reduce((s,c)=>s+(c.premium||0),0);

    const targetAct = freshMe.targetAct || 0;
    const tpRate    = targetTp  > 0 ? Math.round(totalTp      / targetTp  * 100) : 0;
    const actRate   = targetAct > 0 ? Math.round(meetings.length / targetAct * 100) : 0;

    const tpColor  = tpRate >=100?'var(--green)':tpRate >=60?'var(--amber)':'var(--red)';
    const actColor = actRate>=100?'var(--green)':actRate>=60?'var(--amber)':'var(--red)';
    const tpPc     = tpRate >=100?'pg':tpRate >=60?'pm':'pl';
    const actPc    = actRate>=100?'pg':actRate>=60?'pm':'pl';

    const noGoal = targetTp === 0 && targetAct === 0;

    el.innerHTML = `
    <div class="sec-hd"><h2>내 실적</h2><span style="font-size:12px;color:var(--muted)">${today.getFullYear()}년 ${today.getMonth()+1}월</span></div>
    ${noGoal ? `
    <div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:#92400E;line-height:1.6">
        ⚠️ 이번달 목표가 아직 설정되지 않았어요.
        <span style="font-size:12px;color:var(--muted);display:block;margin-top:2px">관리자(CM)에게 월 목표 설정을 요청하세요.</span>
    </div>` : ''}

    <!-- 요약 카드 4개 -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px">
        ${[
            {l:'계약',      v:mc.length+'건',       c:'var(--navy)'},
            {l:'고객미팅',  v:meetings.length+'건',  c:'var(--blue)'},
            {l:'환산TP',    v:String(totalTp),       c:'var(--gold)'},
            {l:'동의 수령', v:ms.length+'건',         c:'var(--green)'},
        ].map(s=>`<div style="background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;text-align:center;box-shadow:var(--sh-sm)">
            <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${s.l}</div>
            <div style="font-size:${s.v.length>6?'16px':'22px'};font-weight:900;color:${s.c};margin-top:5px">${s.v}</div>
        </div>`).join('')}
    </div>

    <!-- 환산TP 달성률 -->
    <div class="card" style="border-top:3px solid var(--gold)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div>
                <div style="font-size:13px;font-weight:700;color:var(--ink)">환산TP 달성률</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">
                    ${totalTp} / ${targetTp > 0 ? targetTp : '미설정'}
                </div>
            </div>
            <div style="font-size:22px;font-weight:900;color:${targetTp>0?tpColor:'var(--muted)'}">
                ${targetTp > 0 ? tpRate+'%' : '-'}

// ============================================================
// 📅 달력 페이지 (관리자 + 신인 공통 열람, 관리자만 이벤트 추가)
//
// 💡 달력 만드는 원리:
// 1. 해당 월 1일이 무슨 요일인지 계산
// 2. 빈 칸(empty) + 날짜 칸을 7열 grid로 나열
// 3. 각 날짜에 해당하는 이벤트를 필터링해서 표시
// ============================================================
let calYear  = today.getFullYear();
let calMonth = today.getMonth(); // 0~11

function pgCalendar(el) {
    renderCalendar(el);
}

function renderCalendar(el) {
    const isAdmin = currentUser.role === 'admin';
    const yr = calYear, mo = calMonth;
    const firstDay  = new Date(yr, mo, 1).getDay();   // 1일의 요일 (0=일)
    const lastDate  = new Date(yr, mo+1, 0).getDate(); // 이번달 마지막 날
    const events    = load('sfp_calendar');
    const moStr     = `${yr}-${String(mo+1).padStart(2,'0')}`;

    // 날짜 칸 생성
    let cells = '';
    for (let i=0; i<firstDay; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d=1; d<=lastDate; d++) {
        const dateStr = `${moStr}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        // 기간 일정 포함 (해당 날짜가 startDate~endDate 사이인 것도 포함)
        const dayEvts = events.filter(e => {
            if (e.endDate && e.endDate > e.date) return dateStr >= e.date && dateStr <= e.endDate;
            return e.date === dateStr;
        });
        const shown   = dayEvts.slice(0,2);
        const more    = dayEvts.length - 2;
        cells += `<div class="cal-cell${isToday?' today':''}" onclick="openCalDay('${dateStr}')">
            <div class="cal-num">${d}</div>
            ${shown.map(e=>`<div class="cal-evt type-${e.type}" title="${e.title}">${e.time?e.time+' ':' '}${e.title}</div>`).join('')}
            ${more>0?`<div class="more-evt">+${more}개 더</div>`:''}
        </div>`;
    }

    el.innerHTML = `
    <div class="sec-hd"><h2>📅 달력</h2></div>
    <div class="cal-wrap" id="calWrap">
        <div class="cal-hdr">
            <button class="cal-nav" onclick="calMove(-1,'${el.id||'calRoot'}')">◀</button>
            <div class="cal-hdr-title">${yr}년 ${mo+1}월</div>
            <button class="cal-nav" onclick="calMove(1,'${el.id||'calRoot'}')">▶</button>
        </div>
        <div class="cal-days-hdr">
            ${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-swipe-hint">← 좌우 스와이프로 월 이동 →</div>
    </div>`;

    // 스와이프 제스처 등록
    const wrap = document.getElementById('calWrap');
    if (wrap && !wrap._swipeInit) {
        wrap._swipeInit = true;
        let startX = 0, startY = 0;
        wrap.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });
        wrap.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
                calMove(dx < 0 ? 1 : -1, '');
            }
        }, { passive: true });
    }

    if (isAdmin) {
        el.innerHTML += `
        <div class="card">
            <div class="card-hd" id="calFormTitle">➕ 일정 추가</div>
            <input type="hidden" id="evEditId" value="">
            <div class="grid2">
                <div class="fg"><label class="lbl">시작 날짜 *</label><input type="date" id="evDate" class="inp" value="${todayStr}"></div>
                <div class="fg"><label class="lbl">종료 날짜 (기간 설정)</label><input type="date" id="evEndDate" class="inp"></div>
                <div class="fg"><label class="lbl">시간</label><input type="time" id="evTime" class="inp"></div>
                <div class="fg"><label class="lbl">구분</label>
                    <select id="evType" class="inp">
                        <option value="일정">📌 일정</option>
                        <option value="마감">🔴 마감</option>
                        <option value="행사">🎉 행사</option>
                        <option value="교육">📚 교육</option>
                        <option value="공지">📢 공지</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="fg"><label class="lbl">제목 *</label><input id="evTitle" class="inp" placeholder="예: 3월 프로모션 마감"></div>
                <div class="fg full"><label class="lbl">메모</label><input id="evNote" class="inp" placeholder="상세 내용 (선택)"></div>
            </div>
            <div style="display:flex;gap:10px">
                <button class="btn btn-p" style="flex:1;justify-content:center" onclick="addCalEvent()">+ 일정 추가</button>
                <button class="btn btn-o" id="calCancelBtn" style="display:none" onclick="cancelEditCal()">취소</button>
            </div>
        </div>`;
    } else {
        el.innerHTML += `
        <div class="card" style="background:#EFF6FF;border:1.5px solid #BFDBFE">
            <div style="font-size:13px;color:#1E40AF;font-weight:600">📢 관리자가 공유한 일정입니다. 날짜를 클릭하면 상세 내용을 볼 수 있어요.</div>
        </div>`;
    }
    el.dataset.calEl = 'true';
}

// 달력 월 이동
// 💡 왜 전역변수(calYear, calMonth)를 쓸까?
// - 이전/다음 버튼 클릭 시 "현재 보고 있는 달"을 기억해야 하기 때문
function calMove(dir, elId) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0)  { calMonth = 11; calYear--; }
    const el = document.getElementById('appMain').firstChild;
    if (el) renderCalendar(el);
}

// 날짜 클릭 → 이벤트 모달
function openCalDay(dateStr) {
    const isAdmin = currentUser.role === 'admin';
    const allEvts = load('sfp_calendar');
    // 기간 일정 포함 - startDate~endDate 범위에 dateStr 포함되면 표시
    const events = allEvts.filter(e => {
        if (e.endDate && e.endDate > e.date) return dateStr >= e.date && dateStr <= e.endDate;
        return e.date === dateStr;
    });
    const [yr, mo, d] = dateStr.split('-');
    const dayNames = ['일','월','화','수','목','금','토'];
    const dayName  = dayNames[new Date(parseInt(yr), parseInt(mo)-1, parseInt(d)).getDay()];
    const typeColor= {일정:'#1E40AF',마감:'#991B1B',행사:'#92400E',공지:'#166534',교육:'#5B21B6',기타:'#374151'};
    const typeBg   = {일정:'#DBEAFE',마감:'#FEE2E2',행사:'#FEF3C7',공지:'#DCFCE7',교육:'#EDE9FE',기타:'#F3F4F6'};

    const evList = events.length
        ? events.map(e=>`
            <div class="evt-item">
                <div class="evt-dot" style="background:${typeColor[e.type]||'#374151'}"></div>
                <div style="flex:1">
                    <div class="evt-item-text">${e.title}</div>
                    ${e.endDate && e.endDate !== e.date
                        ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">📅 ${e.date} ~ ${e.endDate}</div>` : ''}
                    ${e.note ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${e.note}</div>` : ''}
                </div>
                <div class="evt-item-time">${e.time||''}</div>
                ${isAdmin ? `
                <button class="btn btn-o btn-sm" style="padding:4px 8px;font-size:11px"
                    onclick="editCalEvent('${e.id}');closeViewer()">수정</button>
                <button class="btn btn-d btn-sm" style="padding:4px 8px;font-size:11px"
                    onclick="delCalEvent('${e.id}','${dateStr}')">삭제</button>` : ''}
            </div>`).join('')
        : `<div class="empty" style="padding:24px"><div class="empty-ico">📭</div><div>이날 일정이 없습니다</div></div>`;

    document.getElementById('viewerTitle').textContent = '';
    document.getElementById('viewerBody').innerHTML = `
        <div style="margin-bottom:16px">
            <div class="evt-date-badge">${yr}년 ${parseInt(mo)}월 ${parseInt(d)}일 (${dayName})</div>
        </div>
        <div class="evt-list">${evList}</div>`;
    document.getElementById('viewerModal').classList.add('on');
}

function addCalEvent() {
    const editId  = document.getElementById('evEditId').value;
    const date    = document.getElementById('evDate').value;
    const endDate = document.getElementById('evEndDate').value;
    const time    = document.getElementById('evTime').value;
    const type    = document.getElementById('evType').value;
    const title   = document.getElementById('evTitle').value.trim();
    const note    = document.getElementById('evNote').value.trim();
    if (!date || !title) return alert('날짜와 제목을 입력해주세요');
    if (endDate && endDate < date) return alert('종료 날짜는 시작 날짜 이후여야 합니다');

    const cal = load('sfp_calendar');
    if (editId) {
        // 수정 모드
        const idx = cal.findIndex(e => e.id === editId);
        if (idx >= 0) cal[idx] = { ...cal[idx], date, endDate, time, type, title, note };
        save('sfp_calendar', cal);
        cancelEditCal();
        alert('📅 일정이 수정되었습니다');
    } else {
        // 추가 모드
        cal.push({ id:genId(), date, endDate, time, type, title, note, by:currentUser.name });
        save('sfp_calendar', cal);
        document.getElementById('evTitle').value = '';
        document.getElementById('evNote').value  = '';
        document.getElementById('evTime').value  = '';
        document.getElementById('evEndDate').value = '';
        alert('📅 일정이 추가되었습니다');
    }
    const el = document.getElementById('appMain').firstChild;
    if (el) renderCalendar(el);
}

function editCalEvent(id) {
    const e = load('sfp_calendar').find(e => e.id === id);
    if (!e) return;
    document.getElementById('evEditId').value  = e.id;
    document.getElementById('evDate').value    = e.date;
    document.getElementById('evEndDate').value = e.endDate || '';
    document.getElementById('evTime').value    = e.time || '';
    document.getElementById('evType').value    = e.type;
    document.getElementById('evTitle').value   = e.title;
    document.getElementById('evNote').value    = e.note || '';
    document.getElementById('calFormTitle').textContent = '✏️ 일정 수정';
    document.getElementById('calCancelBtn').style.display = 'inline-flex';
    // 폼으로 스크롤
    document.getElementById('evDate').scrollIntoView({ behavior:'smooth', block:'center' });
}

function cancelEditCal() {
    document.getElementById('evEditId').value  = '';
    document.getElementById('evDate').value    = '';
    document.getElementById('evEndDate').value = '';
    document.getElementById('evTime').value    = '';
    document.getElementById('evTitle').value   = '';
    document.getElementById('evNote').value    = '';
    document.getElementById('calFormTitle').textContent = '➕ 일정 추가';
    document.getElementById('calCancelBtn').style.display = 'none';
}

function delCalEvent(id, dateStr) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_calendar', load('sfp_calendar').filter(e => e.id !== id));
    closeViewer();
    const el = document.getElementById('appMain').firstChild;
    if (el) renderCalendar(el);
}

function pgRoutes(el) {
    const filterDate = todayStr;
    el.innerHTML = `
    <div class="sec-hd"><h2>🗺️ 동선 현황</h2></div>
    <div class="card">
        <div class="card-hd">📅 날짜 선택</div>
        <div style="display:flex;gap:10px;align-items:center">
            <input type="date" id="routeFilterDate" class="inp" value="${filterDate}" onchange="refreshRoutes()" style="max-width:180px">
        </div>
    </div>
    <div id="routeResult"></div>`;
    refreshRoutes();
}

function refreshRoutes() {
    const date = document.getElementById('routeFilterDate')?.value || todayStr;
    const routes = load('sfp_routes').filter(r => r.date === date);
    const um = uMap();
    // 신인별로 그룹화
    const grouped = {};
    routes.forEach(r => {
        if (!grouped[r.userId]) grouped[r.userId] = [];
        grouped[r.userId].push(r);
    });
    // 시간순 정렬
    Object.values(grouped).forEach(arr => arr.sort((a,b) => (a.time||'').localeCompare(b.time||'')));

    const [yr,mo,d] = date.split('-');
    const dayName = ['일','월','화','수','목','금','토'][new Date(parseInt(yr), parseInt(mo)-1, parseInt(d)).getDay()];

    const area = document.getElementById('routeResult');
    if (!area) return;

    if (!routes.length) {
        area.innerHTML = `<div class="card"><div class="empty"><div class="empty-ico">🗺️</div><div>${yr}년 ${parseInt(mo)}월 ${parseInt(d)}일 (${dayName}) 등록된 동선이 없습니다</div></div></div>`;
        return;
    }

    area.innerHTML = `<div class="card">
        <div class="card-hd">📍 ${yr}년 ${parseInt(mo)}월 ${parseInt(d)}일 (${dayName}) 일정</div>
        ${Object.entries(grouped).map(([uid, rows]) => `
            <div class="route-date-hdr">👤 ${um[uid]||'(알수없음)'}</div>
            ${rows.map(r => {
                const isMeeting = r.rtype === '고객미팅' || !r.rtype; // 구버전 호환
                const cl = isMeeting ? load('sfp_checklist').find(c => c.routeId === r.id) : null;
                const typeStyleMap = {'고객미팅':'rt-meeting','이동':'rt-move','교육':'rt-edu','사내업무':'rt-internal','기타':'rt-etc'};
                const typeIconMap  = {'고객미팅':'🤝','이동':'🚶','교육':'📚','사내업무':'🏢','기타':'📌'};
                const tCls  = typeStyleMap[r.rtype||'고객미팅'] || 'rt-meeting';
                const tIcon = typeIconMap[r.rtype||'고객미팅'] || '🤝';
                return `
                <div class="route-row" style="flex-wrap:wrap">
                    <div class="route-time">${r.time||'-'}</div>
                    <div style="flex:1;min-width:0">

                        ${r.client ? `<div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px">👤 ${r.client}</div>` : ''}
                        <div class="route-loc">📍 ${r.location}</div>
                        ${r.note?`<div class="route-note">${r.note}</div>`:''}
                    </div>
                    <div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px;align-items:center">
                        ${isMeeting
                            ? (cl
                                ? `<button class="btn btn-g btn-sm" onclick="openChecklistView('${r.id}')" style="font-size:11px;padding:5px 10px">📋 결과보기</button>`

                    </div>
                </div>
                ${cl ? renderChecklistBadge(cl) : ''}`;
            }).join('')}
            <div style="height:10px"></div>
        `).join('')}
    </div>`;
}

function delRoute(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_routes', load('sfp_routes').filter(r=>r.id!==id));

// 💡 유형이 바뀌면 고객명 필드를 흐리게/선명하게
function onRouteTypeChange() {
    const type = document.getElementById('rtType').value;
    const wrap = document.getElementById('clientFieldWrap');
    if (wrap) wrap.classList.toggle('hidden', type !== '고객미팅');
}

function addRoute() {
    const date   = document.getElementById('rtDate').value;
    const time   = document.getElementById('rtTime').value;
    const rtype  = document.getElementById('rtType').value;
    const client = rtype === '고객미팅' ? document.getElementById('rtClient').value.trim() : '';
    const loc    = document.getElementById('rtLoc').value.trim();
    const note   = document.getElementById('rtNote').value.trim();
    if (!date||!loc) return alert('날짜와 장소를 입력해주세요');
    if (rtype === '고객미팅' && !client) return alert('고객미팅은 고객명을 입력해주세요');

    const routeId = genId();

    // ① 일정 저장
    const routes = load('sfp_routes');
    routes.push({id:routeId, userId:currentUser.id, date, time, rtype, client, location:loc, note});
    save('sfp_routes', routes);

    // ② 고객미팅이면 활동기록 즉시 생성
    // 💡 등록 즉시 카운팅 → 체크리스트 완료 시 해당 기록의 메모만 업데이트
    if (rtype === '고객미팅') {
        const acts = load('sfp_activities');
        acts.push({
            id: genId(),
            userId: currentUser.id,
            date, type: '미팅',
            client,
            result: '진행중',
            note: `📍 ${loc}${note ? ' / '+note : ''}`,
            fromChecklist: routeId,  // 체크리스트 연결 키 (동일하게 사용)
        });
        save('sfp_activities', acts);
    }

    ['rtClient','rtLoc','rtNote','rtTime'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value='';
    });
    goTab('my_route');
    alert(rtype === '고객미팅' ? '🤝 고객미팅 등록 완료\n✅ 활동 1건이 바로 카운팅되었습니다' : '📍 일정이 추가되었습니다');
}

function delMyRoute(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_routes', load('sfp_routes').filter(r=>r.id!==id));
    goTab('my_route');
}

// ② 공지 시스템
// sfp_notices 컬렉션에 저장된 공지를 로그인 시 팝업으로 표시
// ============================================================
function showNoticeBanner() {
    // 기존 달력 공지는 배너로 유지
    const notices = load('sfp_calendar')
        .filter(e => e.type === '공지')
        .sort((a,b) => b.date.localeCompare(a.date));
    const banner = document.getElementById('noticeBanner');
    if (!notices.length) { banner.style.display='none'; }
    else {
        const n = notices[0];
        banner.style.display = 'block';
        banner.innerHTML = `
            <div class="notice-banner">
                <span class="notice-banner-icon">📢</span>
                <div class="notice-banner-text">
                    <strong>[공지]</strong> ${n.title}
                    ${n.note ? `<span style="font-weight:400;opacity:.8;margin-left:8px">${n.note}</span>` : ''}
                    <span style="opacity:.5;margin-left:8px;font-size:11px">${n.date}</span>
                </div>
                <button class="notice-banner-close" onclick="this.closest('.notice-banner').parentElement.style.display='none'">×</button>
            </div>`;
    }

    // 새 공지 팝업 표시 (sfp_notices 컬렉션)
    showNoticePopup();
}

function showNoticePopup() {
    const notices = load('sfp_notices')
        .filter(n => n.active)
        .sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    if (!notices.length) return;

    const latest = notices[0];
    // 이미 확인한 공지면 스킵
    const confirmedKey = `notice_confirmed_${latest.id}`;
    if (sessionStorage.getItem(confirmedKey)) return;

    document.getElementById('noticeModalTitle').textContent = latest.title;
    document.getElementById('noticeModalContent').textContent = latest.content;
    document.getElementById('noticeModalDate').textContent = `${latest.by} · ${latest.createdAt}`;
    document.getElementById('noticeModal').classList.add('on');
    document.getElementById('noticeModal')._currentId = latest.id;
}

function closeNoticeModal(confirmed) {
    const modal = document.getElementById('noticeModal');
    const id = modal._currentId;
    if (confirmed && id) {
        sessionStorage.setItem(`notice_confirmed_${id}`, '1');
    }
    modal.classList.remove('on');
}

// 관리자 공지 관리 페이지
function pgNotices(el) {
    const notices = load('sfp_notices').sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    el.innerHTML = `
    <div class="sec-hd"><h2>📢 공지 관리</h2></div>
    <div class="card">
        <div class="card-hd">➕ 새 공지 작성</div>
        <div class="fg"><label class="lbl">제목 *</label><input id="ntTitle" class="inp" placeholder="예: 3월 마감 안내"></div>
        <div class="fg" style="margin-top:10px"><label class="lbl">내용 *</label>
            <textarea id="ntContent" class="inp" rows="5" style="resize:vertical;line-height:1.6"
                placeholder="신인들에게 전달할 공지 내용을 입력하세요.&#10;&#10;예: 이번 주 금요일까지 모든 계약 및 동의 기록을 입력해주세요."></textarea>
        </div>
        <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:10px" onclick="addNotice()">📢 공지 등록</button>
    </div>
    <div class="card">
        <div class="card-hd">📋 등록된 공지 목록</div>
        ${notices.length ? notices.map(n => `
        <div class="notice-item">
            <div class="notice-item-header">
                <div>
                    <div class="notice-item-title">${n.title}</div>
                    <div class="notice-item-date">${n.by} · ${n.createdAt}</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <span style="font-size:12px;padding:3px 10px;border-radius:12px;font-weight:700;
                        background:${n.active?'var(--greenBg,#E8F7EF)':'var(--border)'};
                        color:${n.active?'var(--green)':'var(--muted)'}">
                        ${n.active ? '● 활성' : '○ 비활성'}
                    </span>
                    <button class="btn btn-o btn-sm" onclick="toggleNotice('${n.id}')">
                        ${n.active?'숨기기':'활성화'}
                    </button>
                    <button class="btn btn-d btn-sm" onclick="deleteNotice('${n.id}')">삭제</button>
                </div>
            </div>
            <div class="notice-item-body">${n.content}</div>
        </div>`).join('')
        : `<div class="empty"><div class="empty-ico">📢</div><div>등록된 공지가 없습니다</div></div>`}
    </div>`;
}

function addNotice() {
    const title   = document.getElementById('ntTitle').value.trim();
    const content = document.getElementById('ntContent').value.trim();
    if (!title)   return alert('제목을 입력해주세요');
    if (!content) return alert('내용을 입력해주세요');

    const notices = load('sfp_notices');
    // 기존 활성 공지 모두 비활성화 (최신 1개만 팝업)
    notices.forEach(n => n.active = false);
    notices.unshift({
        id: genId(), title, content,
        by: currentUser.name,
        createdAt: todayStr,
        active: true
    });
    save('sfp_notices', notices);
    goTab('notices');
    alert('📢 공지가 등록되었습니다!\n신인들이 다음 로그인 시 팝업으로 확인합니다.');
}

function toggleNotice(id) {
    const notices = load('sfp_notices');
    const n = notices.find(n => n.id === id);
    if (!n) return;
    if (!n.active) {
        // 활성화 시 다른 공지 비활성화
        notices.forEach(n => n.active = false);
        n.active = true;
    } else {
        n.active = false;
    }
    save('sfp_notices', notices);
    goTab('notices');
}

function deleteNotice(id) {
    if (!confirm('공지를 삭제하시겠습니까?')) return;
    db.collection('sfp_notices').doc(String(id)).delete().catch(e => console.warn(e));
    window._cache['sfp_notices'] = load('sfp_notices').filter(n => n.id !== id);
    goTab('notices');
}

    alert('📨 쪽지를 보냈습니다!\nCM이 확인 후 답장을 드릴 거예요.');

// 관리자 → 쪽지함
function pgMessages(el) {
    const msgs = load('sfp_messages').sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    const unread = msgs.filter(m => !m.read).length;

    el.innerHTML = `
    <div class="sec-hd"><h2>✉️ 쪽지함</h2>
        ${unread > 0 ? `<span style="background:#E53E4D;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px">${unread}건 미확인</span>` : ''}
    </div>
    <div class="card">
        <div class="card-hd">📬 받은 쪽지 (${msgs.length}건)</div>
        ${msgs.length ? msgs.map(m => `
        <div style="padding:16px;background:${m.read?'var(--bg)':'#EFF6FF'};border-radius:var(--r-sm);border:1.5px solid ${m.read?'var(--border)':'#BFDBFE'};margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

                    ${!m.read ? '<span class="msg-unread"></span>' : ''}
                </div>
                <span style="font-size:11px;color:var(--muted)">${m.createdAt}</span>
            </div>
            <div style="font-size:13px;color:var(--ink);line-height:1.7;white-space:pre-wrap;padding:12px;background:#fff;border-radius:8px;margin-bottom:12px;border:1px solid var(--border)">${m.text}</div>
            ${m.reply ? `
            <div class="msg-reply-bubble">
                <div style="font-size:10px;color:var(--gold);font-weight:700;margin-bottom:4px">👑 내 답장 · ${m.repliedAt}</div>
                <div class="msg-reply-text">${m.reply}</div>
            </div>
            <button class="btn btn-o btn-sm" style="margin-top:6px" onclick="editReply('${m.id}')">✏️ 답장 수정</button>
            ` : `
            <textarea id="rt_${m.id}" class="inp" rows="2" style="resize:vertical;font-size:12px;margin-bottom:8px"
                placeholder="답장 입력..."></textarea>
            <div style="display:flex;gap:8px">
                <button class="btn btn-p btn-sm" onclick="sendReply('${m.id}')">📨 답장 보내기</button>
                <button class="btn btn-o btn-sm" onclick="markRead('${m.id}')">✓ 읽음</button>
                <button class="btn btn-d btn-sm" onclick="deleteMsg('${m.id}')">삭제</button>
            </div>`}
        </div>`).join('')

    // 페이지 열면 전체 읽음 처리
    const msgs2 = load('sfp_messages');
    let changed = false;
    msgs2.forEach(m => { if (!m.read) { m.read = true; changed = true; } });
    if (changed) save('sfp_messages', msgs2);
}

function sendReply(id) {
    const text = document.getElementById(`rt_${id}`)?.value.trim();
    if (!text) return alert('답장 내용을 입력해주세요');
    const msgs = load('sfp_messages');
    const m = msgs.find(m => m.id === id);
    if (m) { m.reply = text; m.repliedAt = todayStr; m.read = true; save('sfp_messages', msgs); }
    goTab('messages');
    alert('📨 답장을 보냈습니다!');
}

function editReply(id) {
    const msgs = load('sfp_messages');
    const m = msgs.find(m => m.id === id);
    if (!m) return;
    const newReply = prompt('답장 수정:', m.reply);
    if (newReply === null) return;
    m.reply = newReply.trim(); m.repliedAt = todayStr;
    save('sfp_messages', msgs);
    goTab('messages');
}

function markRead(id) {
    const msgs = load('sfp_messages');
    const m = msgs.find(m => m.id === id);
    if (m) { m.read = true; save('sfp_messages', msgs); }
    goTab('messages');
}

function deleteMsg(id) {
    if (!confirm('쪽지를 삭제하시겠습니까?')) return;
    db.collection('sfp_messages').doc(String(id)).delete().catch(e=>console.warn(e));
    window._cache['sfp_messages'] = load('sfp_messages').filter(m => m.id !== id);
    goTab('messages');
}

// ============================================================
// ① CM 피드백 기능
// 활동/계약 기록에 CM이 한 줄 코멘트를 남기는 기능
// 데이터: sfp_feedback = [{id, targetId, targetType, text, by, at}]
// ============================================================
function getFeedback(targetId) {
    return load('sfp_feedback').filter(f => f.targetId === targetId);
}

function renderFeedbacks(targetId, container) {
    const fbs = getFeedback(targetId);
    const isAdmin = currentUser.role === 'admin';
    const fbHtml = fbs.map(f => `
        <div class="fb-box">
            <div class="fb-avatar">CM</div>
            <div class="fb-content">
                <div class="fb-meta">${f.by} · ${f.at}</div>
                <div class="fb-text">${f.text}</div>
            </div>
            ${isAdmin ? `<button onclick="delFeedback('${f.id}','${targetId}','${container}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 2px;line-height:1">×</button>` : ''}
        </div>`).join('');

    const addForm = isAdmin ? `
        <div class="fb-form">
            <input class="fb-inp" id="fbInp_${targetId}" placeholder="피드백 한 줄 남기기..." onkeydown="if(event.key==='Enter') addFeedback('${targetId}','${container}')">
            <button class="btn btn-g btn-sm" onclick="addFeedback('${targetId}','${container}')">등록</button>
        </div>` : '';

    return fbHtml + addForm;
}

function addFeedback(targetId, container) {
    const inp = document.getElementById(`fbInp_${targetId}`);
    const text = inp?.value.trim();
    if (!text) return;
    const d = load('sfp_feedback');
    d.push({ id:genId(), targetId, text, by:currentUser.name, at:todayStr });
    save('sfp_feedback', d);
    inp.value = '';
    // 해당 피드백 영역만 새로고침
    const area = document.getElementById(`fbArea_${targetId}`);
    if (area) area.innerHTML = renderFeedbacks(targetId, container);
}

function delFeedback(id, targetId, container) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_feedback', load('sfp_feedback').filter(f => f.id !== id));
    const area = document.getElementById(`fbArea_${targetId}`);
    if (area) area.innerHTML = renderFeedbacks(targetId, container);
}

// 📅 주간요약 (관리자·신인 공통)
// 이번 주 월~일 기준 팀 활동 요약
// ============================================================
function pgWeekly(el) {
    // 이번 주 월요일 ~ 일요일 계산
    const now = new Date();
    const dow = now.getDay(); // 0=일
    const mon = new Date(now); mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const fmt2 = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const [wStart, wEnd] = [fmt2(mon), fmt2(sun)];
    const inWeek = date => date >= wStart && date <= wEnd;

    const isAdmin = currentUser.role === 'admin';
    const acts = load('sfp_activities').filter(a => inWeek(a.date||''));
    const cons = load('sfp_contracts').filter(c => inWeek(c.date||''));
    const agrees = load('sfp_consents').filter(c => inWeek(c.date||''));
    const routes = load('sfp_routes').filter(r => inWeek(r.date||''));
    const um = uMap();
    const members = sfpList();

    // 신인이면 본인 데이터만
    const myActs   = isAdmin ? acts   : acts.filter(a => a.userId === currentUser.id);
    const myCons   = isAdmin ? cons   : cons.filter(c => c.userId === currentUser.id);
    const myAgrees = isAdmin ? agrees : agrees.filter(c => c.userId === currentUser.id);
    const myRoutes = isAdmin ? routes : routes.filter(r => r.userId === currentUser.id);

    const wLabel = `${mon.getMonth()+1}/${mon.getDate()} (월) ~ ${sun.getMonth()+1}/${sun.getDate()} (일)`;

    // 요일별 활동 수 (막대 시각화)
    const days = ['월','화','수','목','금','토','일'];
    const dayCounts = days.map((_, i) => {
        const d = fmt2(new Date(mon.getTime() + i * 86400000));
        return myActs.filter(a => a.date === d).length;
    });
    const maxCnt = Math.max(...dayCounts, 1);

    const sfpRows = isAdmin ? members.map(m => {
        const ma = acts.filter(a=>a.userId===m.id).length;
        const mc = cons.filter(c=>c.userId===m.id).length;
        const mag = agrees.filter(c=>c.userId===m.id).length;
        return `<div class="sfp-week-row">
            <div class="sfp-week-name">
                <div class="sfp-avatar">${m.name.charAt(0)}</div>${m.name}
            </div>
            <div class="sfp-week-nums">
                <div class="sfp-week-num"><div class="sfp-week-num-v">${ma}</div><div class="sfp-week-num-l">활동</div></div>
                <div class="sfp-week-num"><div class="sfp-week-num-v">${mc}</div><div class="sfp-week-num-l">계약</div></div>
                <div class="sfp-week-num"><div class="sfp-week-num-v" style="color:var(--green)">${mag}</div><div class="sfp-week-num-l">동의</div></div>
            </div>
        </div>`;
    }).join('') : '';

    el.innerHTML = `
    <div class="sec-hd"><h2>📅 주간 요약</h2><span style="font-size:12px;color:var(--muted)">${wLabel}</span></div>

    <div class="week-grid">
        ${[
            {l:'활동', v:myActs.length, c:'var(--blue)'},
            {l:'계약', v:myCons.length, c:'var(--gold)'},
            {l:'동의', v:myAgrees.length, c:'var(--green)'},
            {l:'동선', v:myRoutes.length, c:'var(--muted)'},
        ].map(s=>`<div class="week-stat">
            <div class="week-stat-v" style="color:${s.c}">${s.v}</div>
            <div class="week-stat-l">${s.l}</div>
        </div>`).join('')}
    </div>

    <div class="card">
        <div class="card-hd">📊 요일별 활동 분포</div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:80px;padding:0 4px">
            ${dayCounts.map((cnt, i) => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                <span style="font-size:11px;font-weight:700;color:var(--navy)">${cnt||''}</span>
                <div style="width:100%;background:${cnt>0?'var(--navy)':'var(--border)'};border-radius:5px 5px 0 0;height:${Math.round((cnt/maxCnt)*56)+4}px;transition:height .4s ease"></div>
                <span style="font-size:11px;color:var(--muted);font-weight:600">${days[i]}</span>
            </div>`).join('')}
        </div>
    </div>

    ${isAdmin && members.length ? `
    <div class="card">
        <div class="card-hd">👥 신인별 이번 주 활동</div>
        ${sfpRows || '<div class="empty"><div class="empty-ico">👥</div><p>등록된 신인이 없습니다</p></div>'}
    </div>` : ''}

    ${myActs.length ? `
    <div class="card">
        <div class="card-hd">📋 이번 주 활동 목록</div>
        <div class="tw"><table>
            <thead><tr><th>날짜</th>${isAdmin?'<th>SFP</th>':''}<th>유형</th><th>고객명</th><th>결과</th></tr></thead>
            <tbody>${myActs.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`
                <tr><td>${a.date}</td>${isAdmin?`<td><strong>${um[a.userId]||'?'}</strong></td>`:''}<td><span class="badge bi">${a.type}</span></td><td>${a.client||'-'}</td><td>${a.result}</td></tr>
            `).join('')}</tbody>
        </table></div>
    </div>` : ''}`;
}

// 칩 토글 (복수 선택)
function toggleChip(el, groupId) {
    el.classList.toggle('sel');
}
// 단일 선택 칩
function singleChip(el, groupId) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.cl-chip').forEach(c => {
        c.classList.remove('sel','sel-green','sel-red');
    });
    // 어떤 sel 클래스로 표시할지 판단
    if (el.textContent.includes('확정')||el.textContent.includes('진행함')) el.classList.add('sel-green');
    else if (el.textContent.includes('거절')) el.classList.add('sel-red');
    else el.classList.add('sel');
}

function saveChecklist() {
    if (!_clRouteId) return;
    const route = load('sfp_routes').find(r => r.id === _clRouteId);

    // 복수 선택 값 읽기
    const getChips = id => [...document.getElementById(id).querySelectorAll('.cl-chip.sel,.cl-chip.sel-green,.cl-chip.sel-red')]
        .map(c => c.textContent.trim().replace(/^[✅❌🔄⏸️📅➖]/,'').trim());

    const topics     = getChips('clTopics');
    const duration   = getChips('clDuration')[0] || '';
    const nextMeeting= getChips('clNext')[0] || '';
    const productPT  = getChips('clPT')[0] || '';
    const clientType = getChips('clClient');
    const memo       = document.getElementById('clMemo').value.trim();

    // ① 체크리스트 저장
    const all = load('sfp_checklist').filter(c => c.routeId !== _clRouteId);
    all.push({
        id: genId(), routeId: _clRouteId,
        userId: route?.userId || currentUser.id,
        date: route?.date || todayStr,
        location: route?.location || '',
        topics, duration, nextMeeting, productPT, clientType, memo
    });
    save('sfp_checklist', all);

    // ② 활동기록 자동 생성
    // 💡 체크리스트 내용을 조합해서 활동기록 메모로 자동 변환
    // - 이미 같은 routeId로 생성된 활동기록이 있으면 덮어쓰기 (중복 방지)
    const actMemo = [
        topics.length   ? `주제: ${topics.join('·')}` : '',
        duration        ? `상담시간: ${duration}` : '',
        nextMeeting     ? `2차미팅: ${nextMeeting}` : '',
        productPT       ? `PT: ${productPT}` : '',
        clientType.length ? `성향: ${clientType.join('·')}` : '',
        memo            ? `특이사항: ${memo}` : '',
    ].filter(Boolean).join(' / ');

    // 결과 매핑: 2차미팅 상태 → 활동 결과
    const resultMap = { '확정':'재접촉예정', '조정중':'재접촉예정', '거절':'거절', '보류':'보류' };
    const actResult = resultMap[nextMeeting] || '진행중';

    // 💡 이미 등록 시 생성된 활동기록을 찾아서 메모·결과만 업데이트
    // 새로 push하지 않아 중복 카운팅 없음
    const activities = load('sfp_activities');
    const existing = activities.find(a => a.fromChecklist === _clRouteId);
    if (existing) {
        existing.result = actResult;
        existing.note   = actMemo;
    } else {
        // 혹시 활동기록이 없으면 (구버전 데이터 등) 새로 생성
        activities.push({
            id: genId(),
            userId: route?.userId || currentUser.id,
            date: route?.date || todayStr,
            type: '미팅',
            client: route?.client || route?.location || '',
            result: actResult,
            note: actMemo,
            fromChecklist: _clRouteId,
        });
    }
    save('sfp_activities', activities);

    closeChecklist();
    goTab('my_route');
    alert('📋 체크리스트 저장 완료\n✅ 활동기록이 업데이트되었습니다');
}

                <div class="qc-form">
                    <input class="qc-inp" id="qci_${m.id}" placeholder="오늘 코칭 한 마디..." onkeydown="if(event.key==='Enter') addQuickComment('${m.id}')">
                    <button class="btn btn-p btn-sm" onclick="addQuickComment('${m.id}')">등록</button>
                </div>
            </div>
            <!-- 월간 노트 패널 -->
            <div id="cp_monthly_${m.id}" style="display:none">
                <div id="notes_${m.id}">${renderNotes(m.id)}</div>
                <div class="note-add-form">
                    <div style="display:flex;gap:8px;align-items:center">
                        <input type="month" id="nm_${m.id}" class="inp" value="${thisYM}" style="max-width:148px">
                        <span style="font-size:12px;color:var(--muted)">월 종합 코칭 노트</span>
                    </div>
                    <textarea id="nt_${m.id}" class="inp" rows="3" placeholder="이번 달 종합 코칭 내용, 목표 리뷰, 개선점..."></textarea>
                    <div><button class="btn btn-p btn-sm" onclick="addCoachingNote('${m.id}')">💾 노트 저장</button></div>
                </div>
            </div>`;
        el.appendChild(div);
    });
}

function switchCoachingTab(userId, tab, btn) {
    document.getElementById(`cp_quick_${userId}`).style.display   = tab==='quick'   ? 'block' : 'none';
    document.getElementById(`cp_monthly_${userId}`).style.display = tab==='monthly' ? 'block' : 'none';
    btn.closest('.coaching-tabs').querySelectorAll('.coaching-tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
}

// 빠른 코멘트
function renderQuickComments(userId) {
    const comments = load('sfp_quick_comments')
        .filter(c => c.userId === userId)
        .sort((a,b) => b.at.localeCompare(a.at))
        .slice(0, 10); // 최근 10개
    if (!comments.length) return `<div style="font-size:13px;color:var(--muted);padding:8px 0 12px">아직 코멘트가 없습니다.</div>`;
    return `<div style="margin-bottom:8px">${comments.map(c => `
        <div class="quick-comment">
            <div class="qc-meta">
                <span>👑 ${c.by}</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <span>${c.at}</span>
                    <button class="qc-del" onclick="delQuickComment('${c.id}','${userId}')">×</button>
                </div>
            </div>
            <div class="qc-text">${c.text}</div>
        </div>`).join('')}</div>`;
}

function addQuickComment(userId) {
    const inp  = document.getElementById(`qci_${userId}`);
    const text = inp?.value.trim();
    if (!text) return;
    const d = load('sfp_quick_comments');
    d.push({ id:genId(), userId, text, by:currentUser.name, at:todayStr });
    save('sfp_quick_comments', d);
    inp.value = '';
    document.getElementById(`cp_quick_${userId}`).innerHTML =
        renderQuickComments(userId) +
        `<div class="qc-form">
            <input class="qc-inp" id="qci_${userId}" placeholder="오늘 코칭 한 마디..." onkeydown="if(event.key==='Enter') addQuickComment('${userId}')">
            <button class="btn btn-p btn-sm" onclick="addQuickComment('${userId}')">등록</button>
        </div>`;
}

function delQuickComment(id, userId) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_quick_comments', load('sfp_quick_comments').filter(c => c.id !== id));
    document.getElementById(`cp_quick_${userId}`).innerHTML =
        renderQuickComments(userId) +
        `<div class="qc-form">
            <input class="qc-inp" id="qci_${userId}" placeholder="오늘 코칭 한 마디..." onkeydown="if(event.key==='Enter') addQuickComment('${userId}')">
            <button class="btn btn-p btn-sm" onclick="addQuickComment('${userId}')">등록</button>
        </div>`;
}

// 월간 노트 (기존 유지)
function renderNotes(userId) {
    const notes = load('sfp_coaching').filter(n => n.userId === userId).sort((a,b) => b.yearMonth.localeCompare(a.yearMonth));
    if (!notes.length) return `<div style="font-size:13px;color:var(--muted);padding:8px 0">아직 작성된 노트가 없습니다.</div>`;
    return notes.map(n => `
        <div class="note-item">
            <div class="note-item-hd">
                <span class="note-month">${n.yearMonth}</span>
                <button onclick="delCoachingNote('${n.id}','${userId}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0">×</button>
            </div>
            <div class="note-text">${n.text}</div>
            <div style="font-size:10.5px;color:var(--dimmed);margin-top:6px">${n.by} · ${n.at}</div>
        </div>`).join('');
}

function addCoachingNote(userId) {
    const ym = document.getElementById(`nm_${userId}`)?.value;
    const text = document.getElementById(`nt_${userId}`)?.value.trim();
    if (!ym || !text) return alert('월과 내용을 입력해주세요');
    const d = load('sfp_coaching');
    d.push({ id:genId(), userId, yearMonth:ym, text, by:currentUser.name, at:todayStr });
    save('sfp_coaching', d);
    document.getElementById(`nt_${userId}`).value = '';
    document.getElementById(`notes_${userId}`).innerHTML = renderNotes(userId);
}

function delCoachingNote(id, userId) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_coaching', load('sfp_coaching').filter(n => n.id !== id));
    document.getElementById(`notes_${userId}`).innerHTML = renderNotes(userId);
}




function pgMaterials(el) {
    el.innerHTML = `
    <div class="sec-hd"><h2>자료실</h2></div>
    <div class="card" style="text-align:center;padding:30px">
        <div style="font-size:13px;color:var(--muted)">자료 불러오는 중...</div>
    </div>`;
    window._fsLoad('sfp_promos').then(() => {
        el.innerHTML = `
        <div class="sec-hd"><h2>자료실</h2></div>
        <div class="card">
            <div class="card-hd">📚 장표 / 프로모션 자료</div>
            <div id="promoGridArea"></div>
        </div>`;
        renderPromoGrid(false);
    });
}

// ============================================================
// 🚀 앱 시작
// ============================================================
function startApp() {
    initApp();
}
// _onFirebaseReady는 Firebase 초기화 완료 시 호출됨
window._onFirebaseReady = startApp;
</script>
