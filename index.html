<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>선릉금융 SFP</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
    // ============================================================
    // 🔥 Firebase 동시 사용 안전 설계
    //
    // 핵심 원칙: 컬렉션별 개별 문서 저장
    //   sfp_users/{id}      = 유저 1명
    //   sfp_contracts/{id}  = 계약 1건
    //   ...
    //
    // 이렇게 하면 A와 B가 동시에 저장해도 서로 다른 문서에 저장되므로
    // 절대 덮어쓰기가 발생하지 않음
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyAVM_wW456LJ0a1IJA7pWDg1dP7205H4OQ",
        authDomain: "sfp-seolleung.firebaseapp.com",
        projectId: "sfp-seolleung",
        storageBucket: "sfp-seolleung.firebasestorage.app",
        messagingSenderId: "747116418132",
        appId: "1:747116418132:web:9e24baa72825d8344589c1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 💡 sfp_promos는 이미지 base64 데이터가 커서 초기 로딩에서 제외
    // 장표관리/자료실 탭 열 때 따로 로드
    const EAGER_COLLECTIONS = [
        'sfp_users','sfp_routes','sfp_checklist','sfp_activities',
        'sfp_contracts','sfp_consents','sfp_calendar',
        'sfp_quick_comments','sfp_coaching','sfp_feedback','sfp_notices','sfp_messages'
    ];
    const LAZY_COLLECTIONS = ['sfp_promos'];
    const COLLECTIONS = [...EAGER_COLLECTIONS, ...LAZY_COLLECTIONS];

    // 메모리 캐시 (컬렉션명 → 배열)
    window._cache = {};

    // ── 컬렉션 전체 로드
    window._fsLoad = (col) => {
        return db.collection(col).get().then(snap => {
            window._cache[col] = snap.docs.map(d => d.data());
        }).catch(() => {
            window._cache[col] = window._cache[col] || [];
        });
    };

    // ── 레코드 1개 저장/업데이트 (id 기준)
    // 기존 save(key, array) 호출을 그대로 받아서 처리
    window._fsSave = (col, arr) => {
        if (!Array.isArray(arr)) return;
        // 캐시 즉시 업데이트 (화면 반영용)
        window._cache[col] = arr;

        const batch = db.batch();
        let batchCount = 0;
        arr.forEach(item => {
            if (!item.id) return;
            const ref = db.collection(col).doc(String(item.id));
            batch.set(ref, item);
            batchCount++;
        });
        // 삭제된 레코드 처리는 delRec에서 직접 처리하므로 여기선 생략
        if (batchCount > 0) {
            batch.commit().catch(e => console.warn('Firestore batch error:', e));
        }
    };

    // ── 실시간 리스너 (컬렉션 전체 감지)
    window._fsListen = (col) => {
        db.collection(col).onSnapshot(snap => {
            if (!window._cache[col]) window._cache[col] = [];
            snap.docChanges().forEach(change => {
                const data = change.doc.data();
                if (change.type === 'added' || change.type === 'modified') {
                    const idx = window._cache[col].findIndex(i => String(i.id) === change.doc.id);
                    if (idx >= 0) window._cache[col][idx] = data;
                    else window._cache[col].push(data);
                } else if (change.type === 'removed') {
                    window._cache[col] = window._cache[col].filter(i => String(i.id) !== change.doc.id);
                }
            });

            if (!window._loggedIn) return;

            // 신인: 자동 재렌더링 (관리자가 수정/삭제해도 바로 반영)
            // 관리자: 배지만 표시 (자동 재렌더링 시 입력 중이던 폼 초기화 방지)
            if (currentUser && currentUser.role === 'sfp') {
                if (window._currentTabId && window._pageMap) {
                    const fn = window._pageMap[window._currentTabId];
                    const main = document.getElementById('appMain');
                    if (fn && main && main.firstChild) {
                        fn(main.firstChild);
                    }
                }
            } else {
                if (window._newDataKeys) window._newDataKeys.add(col);
                updateRefreshBadge();
            }
        }, e => console.warn('Listener error:', col, e));
    };

    // firebaseInit은 DOM 로드 후 실행 (body가 없으면 loadingScreen을 못 찾음)
    window._firebaseReady = false;
    document.addEventListener('DOMContentLoaded', function() {
        const loadingEl = document.getElementById('loadingScreen');
        if (loadingEl) loadingEl.style.display = 'flex';

        function startAppNow() {
            if (window._started) return;
            window._started = true;
            if (loadingEl) loadingEl.style.display = 'none';
            window._fsInitDone = true;
            window._appReady = true;
            if (window._onFirebaseReady) window._onFirebaseReady();
        }

        // 5초 안에 Firebase 로드 안 되면 강제 시작
        const timer = setTimeout(startAppNow, 5000);

        Promise.all(EAGER_COLLECTIONS.map(c => window._fsLoad(c)))
            .then(() => { EAGER_COLLECTIONS.forEach(c => window._fsListen(c)); })
            .catch(e => console.warn('Firebase 초기화 오류:', e))
            .finally(() => {
                clearTimeout(timer);
                startAppNow();
            });
    });
    </script>
    <style>
        /* 로딩 화면 */
        #loadingScreen {
            display:flex; position:fixed; inset:0; z-index:9999;
            background:#03122B; flex-direction:column;
            align-items:center; justify-content:center; gap:20px;
        }
        .loading-logo {
            width:64px; height:64px; border-radius:18px;
            background:linear-gradient(145deg,#D4AB4E,#B8922A);
            display:flex; align-items:center; justify-content:center;
            font-size:28px; font-weight:900; color:#03122B;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.95)} }
        .loading-text { color:rgba(255,255,255,.6); font-size:14px; font-family:'Noto Sans KR',sans-serif; }
        .loading-bar { width:180px; height:3px; background:rgba(255,255,255,.12); border-radius:2px; overflow:hidden; }
        .loading-bar-inner { height:100%; width:40%; background:#B8922A; border-radius:2px; animation:slide 1s ease-in-out infinite; }
        @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

        /* ============================================================
           🎨 삼성생명 × 모니모 프리미엄 디자인 시스템
           - 딥 네이비 + 순백 + 금빛 포인트
           - 절제된 간격, 섬세한 타이포그래피
           - 모니모(Monimo) 수준의 핀테크 UI
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

        :root {
            /* 메인 컬러 */
            --ink:    #03122B;   /* 최심부 네이비 — 헤더, 강조 텍스트 */
            --navy:   #0C2461;   /* 삼성생명 메인 블루 */
            --blue:   #1A56DB;   /* 인터랙션 블루 */
            --gold:   #B8922A;   /* 삼성생명 골드 */
            --gold-l: #D4AB4E;   /* 골드 라이트 */
            --gold-bg:#FBF5E6;   /* 골드 배경 */

            /* 그레이 스케일 */
            --bg:     #F4F6FA;   /* 페이지 배경 */
            --surface:#FFFFFF;   /* 카드 배경 */
            --border: #E8ECF3;   /* 구분선 */
            --border2:#D1D9E8;   /* 강조 구분선 */
            --text:   #0D1B34;   /* 본문 */
            --sub:    #4A5878;   /* 보조 텍스트 */
            --muted:  #8E9AB5;   /* 약한 텍스트 */
            --dimmed: #B8C2D6;   /* 비활성 */

            /* 상태 컬러 */
            --green:  #0E7C4A;
            --green-l:#E8F7EF;
            --red:    #C0283A;
            --red-l:  #FDEEF0;
            --amber:  #B45309;
            --amber-l:#FEF3E2;
            --violet: #4338CA;
            --violet-l:#EEEDFB;

            /* 반경·그림자 */
            --r-sm:  8px;
            --r-md:  14px;
            --r-lg:  20px;
            --r-xl:  28px;
            --sh-sm: 0 1px 4px rgba(3,18,43,.06), 0 2px 12px rgba(3,18,43,.04);
            --sh-md: 0 2px 8px rgba(3,18,43,.07), 0 6px 24px rgba(3,18,43,.06);
            --sh-lg: 0 8px 32px rgba(3,18,43,.12), 0 2px 8px rgba(3,18,43,.06);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size:16px; }
        body {
            font-family:'Noto Sans KR', sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh; -webkit-font-smoothing:antialiased;
            letter-spacing:-0.01em;
        }
        button, input, select, textarea { font-family:inherit; }

        /* ============================================================
           🔐 로그인 — 딥 네이비 + 절제된 기하학 배경
           ============================================================ */
        #loginScreen {
            min-height:100vh;
            background: #060E24;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:40px 24px; position:relative; overflow:hidden;
        }
        /* 배경 빛 효과 */
        #loginScreen::before {
            content:''; position:absolute;
            width:600px; height:600px; border-radius:50%;
            background:radial-gradient(circle, rgba(26,86,219,.18) 0%, transparent 70%);
            top:-100px; left:50%; transform:translateX(-50%);
            pointer-events:none;
        }
        #loginScreen::after {
            content:''; position:absolute;
            width:400px; height:400px; border-radius:50%;
            background:radial-gradient(circle, rgba(184,146,42,.1) 0%, transparent 70%);
            bottom:-80px; right:-60px;
            pointer-events:none;
        }
        /* 배경 격자 패턴 */
        .login-grid-bg {
            position:absolute; inset:0; pointer-events:none;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size:48px 48px;
        }

        .login-brand { z-index:1; text-align:center; margin-bottom:44px; animation: fadeUp .6s .05s both; }
        .login-logo-ring {
            width:72px; height:72px; margin:0 auto 16px;
            border-radius:22px;
            background:linear-gradient(145deg, var(--gold-l) 0%, var(--gold) 100%);
            box-shadow:0 0 0 1px rgba(184,146,42,.3), 0 12px 40px rgba(184,146,42,.28);
            display:flex; align-items:center; justify-content:center;
        }
        .login-logo-inner {
            width:44px; height:44px; background:var(--ink);
            border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; font-weight:900; color:var(--gold-l); letter-spacing:-1px;
        }

        }

            font-weight:400; letter-spacing:.6px; text-transform:uppercase;
        }

        .login-card {

        .login-toggle {

        .login-lbl {
            display:block; color:rgba(255,255,255,.5);
            font-size:10.5px; font-weight:700; letter-spacing:.8px;
            text-transform:uppercase; margin-bottom:8px;
        }

            width:100%; padding:13px 16px;

            margin-bottom:16px; transition:border-color .2s, background .2s;
        }
        .login-inp::placeholder { color:rgba(255,255,255,.25); }
        .login-inp:focus { outline:none; border-color:var(--gold-l); background:rgba(255,255,255,.11); }

        .login-btn {
            width:100%; padding:14px; margin-top:4px;
            background:linear-gradient(135deg, var(--gold-l) 0%, var(--gold) 100%);
            border:none; border-radius:var(--r-sm); color:var(--ink);
            font-size:14px; font-weight:800; letter-spacing:.1px;
            cursor:pointer; transition:all .2s;
            box-shadow:0 4px 16px rgba(184,146,42,.35);
        }
        .login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(184,146,42,.45); }
        .login-btn:active { transform:none; box-shadow:none; }

        .login-panel { display:none; }
        .login-panel.on { display:block; }
        .login-err { color:#FCA5A5; font-size:12.5px; text-align:center; margin-top:12px; min-height:18px; }
        .login-ok  { color:#6EE7B7; font-size:12.5px; text-align:center; margin-top:12px; }
        .login-hint {
            color:rgba(255,255,255,.2); font-size:11px;
            text-align:center; margin-top:24px; z-index:1; line-height:1.8;
        }

        /* ============================================================
           📱 앱 레이아웃
           ============================================================ */
        #appWrap { display:none; flex-direction:column; min-height:100vh; }
        #appWrap.on { display:flex; }

        /* 헤더 — 더 얇고 정제된 라인 */
        .app-hdr {
            height:58px; padding:0 20px;
            background:var(--ink);
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:300;
            border-bottom:1px solid rgba(255,255,255,.07);
        }
        .hdr-left { display:flex; align-items:center; gap:12px; }
        .hdr-logo {
            width:34px; height:34px;
            background:linear-gradient(145deg, var(--gold-l), var(--gold));
            border-radius:10px; display:flex; align-items:center; justify-content:center;
            font-size:17px; font-weight:900; color:var(--ink); flex-shrink:0;
            box-shadow:0 2px 8px rgba(184,146,42,.3);
        }
        .hdr-name { font-size:14px; font-weight:700; color:#fff; line-height:1.2; letter-spacing:-.2px; }
        .hdr-role { font-size:10.5px; color:rgba(255,255,255,.45); font-weight:400; letter-spacing:.1px; }
        .logout-btn {
            background:transparent; border:1px solid rgba(255,255,255,.18);
            color:rgba(255,255,255,.65); padding:6px 13px; border-radius:var(--r-sm);
            font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
            transition:all .18s; letter-spacing:-.1px;
        }

        .refresh-btn {
            background:transparent; border:1px solid rgba(255,255,255,.18);
            color:rgba(255,255,255,.65); padding:6px 10px; border-radius:var(--r-sm);
            font-size:15px; cursor:pointer; position:relative; transition:all .18s;
        }
        .refresh-btn:hover { background:rgba(255,255,255,.1); }
        .refresh-badge { position:absolute; top:-3px; right:-3px; width:9px; height:9px; background:#E53E4D; border-radius:50%; display:none; border:1.5px solid var(--ink); }

        /* 탭 — 하단 진한 선 대신 골드 하이라이트 */

        }
        .t-btn:hover { color:var(--navy); }
        .t-btn.on { color:var(--navy); border-bottom-color:var(--gold); font-weight:700; }

        .app-main { flex:1; padding:22px 16px 48px; max-width:960px; margin:0 auto; width:100%; }

        /* ============================================================
           🧩 공통 컴포넌트 — 더 가볍고 정제된 카드
           ============================================================ */
        .card {
            background:var(--surface); border-radius:var(--r-md);
            padding:22px; box-shadow:var(--sh-sm);
            border:1px solid var(--border);
            margin-bottom:14px;
        }

            font-size:13px; font-weight:700; color:var(--ink);

            font-size:10.5px; font-weight:700; color:var(--muted);

            box-shadow:0 0 0 3px rgba(26,86,219,.1);
        }
        textarea.inp { resize:vertical; }

        .grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }

        /* 버튼 시스템 */
        .btn {
            padding:10px 20px; border:none; border-radius:var(--r-sm);
            font-size:13px; font-weight:700; cursor:pointer;
            transition:all .18s; display:inline-flex; align-items:center;
            gap:7px; letter-spacing:-.1px; white-space:nowrap;
        }
        .btn-p {
            background:var(--navy); color:#fff;
            box-shadow:0 2px 8px rgba(12,36,97,.2);
        }
        .btn-p:hover { background:#0A1E58; transform:translateY(-1px); box-shadow:0 4px 16px rgba(12,36,97,.3); }
        .btn-g {
            background:linear-gradient(135deg,var(--gold-l),var(--gold));
            color:var(--ink); box-shadow:0 2px 8px rgba(184,146,42,.25);
        }
        .btn-g:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(184,146,42,.35); }
        .btn-d {
            background:transparent; color:var(--red);
            border:1px solid rgba(192,40,58,.3); padding:6px 12px; font-size:12px;
        }
        .btn-d:hover { background:var(--red-l); border-color:var(--red); }
        .btn-o { background:transparent; color:var(--navy); border:1.5px solid var(--border2); }
        .btn-o:hover { background:var(--bg); border-color:var(--navy); }

            background:rgba(255,255,255,.12); color:#fff;
            border:1px solid rgba(255,255,255,.2);
        }
        .btn-w:hover { background:rgba(255,255,255,.22); }
        .btn-sm { padding:6px 12px; font-size:11.5px; }

        /* ============================================================
           📊 통계 카드 — 모니모 스타일 넘버 카드
           ============================================================ */
        .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px; }
        @media(min-width:580px){ .stat-grid { grid-template-columns:repeat(4,1fr); } }
        .stat-card {
            background:var(--surface); border-radius:var(--r-md);
            padding:18px 16px; box-shadow:var(--sh-sm);
            border:1px solid var(--border); position:relative; overflow:hidden;
        }
        .stat-card::after {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background:var(--accent-color, var(--gold));
            border-radius:var(--r-md) var(--r-md) 0 0;
        }
        .stat-lbl { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
        .stat-v { font-weight:800; color:var(--ink); margin:6px 0 2px; line-height:1.1; }

        /* 진행 바 */
        .prog-bg { background:#EBF0F8; border-radius:6px; height:6px; overflow:hidden; }
        .prog { height:100%; border-radius:6px; transition:width .5s cubic-bezier(.4,0,.2,1); }
        .pg { background:linear-gradient(90deg,#0E7C4A,#12A862); }
        .pm { background:linear-gradient(90deg,#B45309,#D97706); }
        .pl { background:linear-gradient(90deg,#C0283A,#E53E4D); }

        /* ============================================================
           🗂️ 테이블
           ============================================================ */
        .tw { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--r-sm); }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th {
            background:#F7F9FC; color:var(--muted);
            font-weight:700; font-size:10.5px; padding:11px 14px;
            text-align:left; border-bottom:1px solid var(--border);
            white-space:nowrap; letter-spacing:.3px; text-transform:uppercase;
        }
        td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:#F9FAFD; }

        /* ============================================================
           🏷️ 배지 시스템
           ============================================================ */
        .badge {
            display:inline-flex; align-items:center;
            padding:3px 9px; border-radius:20px;
            font-size:11px; font-weight:700; letter-spacing:-.1px;
        }
        .bs { background:var(--green-l); color:var(--green); }
        .bw { background:var(--amber-l); color:var(--amber); }
        .bi { background:#E8F0FE; color:#1A56DB; }
        .bd { background:var(--red-l); color:var(--red); }
        .bg_ { background:var(--gold-bg); color:var(--gold); }
        .bn { background:var(--violet-l); color:var(--violet); }

        /* ============================================================
           👤 신인 카드 — 정제된 프로필 카드
           ============================================================ */
        .sfp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; }
        .sfp-c {
            background:var(--surface); border-radius:var(--r-md);
            padding:20px; box-shadow:var(--sh-sm); border:1px solid var(--border);
            position:relative; overflow:hidden;
        }
        .sfp-c::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background:linear-gradient(90deg, var(--gold-l), var(--gold));
        }
        .sfp-cn {
            font-size:14px; font-weight:700; color:var(--ink);
            margin-bottom:14px; display:flex; align-items:center; gap:8px;
        }
        .sfp-avatar {
            width:30px; height:30px; border-radius:9px;
            background:linear-gradient(135deg,var(--navy),#1A56DB);
            display:inline-flex; align-items:center; justify-content:center;
            font-size:13px; color:#fff; font-weight:800; flex-shrink:0;
        }
        .sfp-r { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
        .sfp-r strong { color:var(--ink); font-weight:700; }

        /* ============================================================
           🗂️ 섹션 헤더
           ============================================================ */
        .sec-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
        .sec-hd h2 { font-size:18px; font-weight:800; color:var(--ink); letter-spacing:-.4px; }

        /* 필터 바 */
        .fbar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
        .fbar .inp { max-width:148px; font-size:12px; padding:7px 11px; }

        /* 빈 상태 */
        .empty { text-align:center; padding:52px 20px; color:var(--dimmed); }
        .empty-ico { font-size:36px; margin-bottom:12px; opacity:.7; }
        .empty p { font-size:13px; font-weight:500; }

        /* ============================================================
           📅 달력 — 클린 미니멀
           ============================================================ */
        .cal-wrap { background:var(--surface); border-radius:var(--r-md); overflow:hidden; box-shadow:var(--sh-sm); border:1px solid var(--border); margin-bottom:14px; touch-action:pan-y; }
        .cal-hdr { background:var(--ink); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
        .cal-hdr-title { font-size:15px; font-weight:700; letter-spacing:-.3px; }
        .cal-nav {
            background:rgba(255,255,255,.1); border:none; color:rgba(255,255,255,.9);
            width:32px; height:32px; border-radius:var(--r-sm); cursor:pointer;
            font-size:16px; display:flex; align-items:center; justify-content:center;
            transition:background .15s; -webkit-tap-highlight-color:transparent;
        }
        .cal-nav:hover { background:rgba(255,255,255,.22); }
        .cal-days-hdr { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); border-bottom:1px solid var(--border); }
        .cal-day-name { text-align:center; padding:8px 2px; font-size:11px; font-weight:700; color:var(--muted); }
        .cal-day-name:first-child { color:var(--red); }
        .cal-day-name:last-child { color:var(--blue); }
        .cal-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); }
        .cal-cell {
            min-height:52px; border-right:1px solid var(--border); border-bottom:1px solid var(--border);
            padding:4px 3px; cursor:pointer; transition:background .13s; position:relative;
            overflow:hidden; min-width:0;
            -webkit-tap-highlight-color:transparent;
        }
        @media (min-width:400px) { .cal-cell { min-height:64px; padding:6px 5px; } }
        .cal-cell:hover { background:#F5F8FF; }
        .cal-cell.today { background:#FDFBF4; }
        .cal-cell.empty { background:#FAFBFC; cursor:default; }
        .cal-num {
            font-size:11px; font-weight:600; color:var(--sub);
            width:20px; height:20px; display:flex; align-items:center; justify-content:center;
            margin-bottom:2px; border-radius:50%;
        }
        @media (min-width:400px) { .cal-num { font-size:12.5px; width:24px; height:24px; } }
        .cal-cell.today .cal-num { background:var(--gold); color:var(--ink); font-weight:800; }
        .cal-cell:nth-child(7n+1) .cal-num { color:var(--red); }
        .cal-cell:nth-child(7n) .cal-num { color:var(--blue); }
        .cal-evt {
            font-size:8.5px; font-weight:600; padding:1px 3px; border-radius:3px;
            margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            display:block; max-width:100%; box-sizing:border-box;
        }
        @media (min-width:400px) { .cal-evt { font-size:9.5px; padding:2px 5px; border-radius:4px; margin-bottom:2px; } }
        .cal-evt.type-일정 { background:#E8F0FE; color:#1A56DB; }
        .cal-evt.type-마감 { background:var(--red-l); color:var(--red); }
        .cal-evt.type-행사 { background:var(--amber-l); color:var(--amber); }
        .cal-evt.type-공지 { background:var(--green-l); color:var(--green); }
        .cal-evt.type-교육 { background:#EDE9FE; color:#5B21B6; }
        .cal-evt.type-기타 { background:var(--border); color:var(--sub); }
        .more-evt { font-size:8px; color:var(--muted); font-weight:600; }
        /* 스와이프 힌트 */
        .cal-swipe-hint { text-align:center; font-size:11px; color:var(--muted); padding:6px 0 2px; }

        /* 이벤트 모달 */
        .evt-modal-overlay { display:none; position:fixed; inset:0; background:rgba(3,18,43,.7); z-index:500; align-items:flex-end; justify-content:center; }
        .evt-modal-overlay.on { display:flex; }
        @media(min-width:500px){ .evt-modal-overlay { align-items:center; } }
        .evt-modal { background:var(--surface); border-radius:var(--r-lg) var(--r-lg) 0 0; width:100%; max-width:480px; padding:28px; max-height:80vh; overflow-y:auto; }
        @media(min-width:500px){ .evt-modal { border-radius:var(--r-lg); } }
        .evt-modal-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .evt-date-badge { font-size:14px; font-weight:800; color:var(--ink); letter-spacing:-.3px; }
        .evt-list { margin-bottom:16px; }
        .evt-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:var(--r-sm); background:var(--bg); margin-bottom:8px; border:1px solid var(--border); }
        .evt-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .evt-item-text { flex:1; font-size:13px; font-weight:600; color:var(--text); }
        .evt-item-time { font-size:11px; color:var(--muted); font-weight:500; }

        /* ============================================================
           🗺️ 동선
           ============================================================ */
        .route-date-hdr { font-size:12px; font-weight:700; color:var(--muted); padding:8px 0 8px; border-bottom:1px solid var(--border); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
        .route-row { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--bg); border-radius:var(--r-sm); margin-bottom:7px; border:1px solid var(--border); }
        .route-time { font-size:12px; font-weight:700; color:var(--gold); min-width:50px; background:var(--gold-bg); padding:4px 8px; border-radius:6px; text-align:center; }
        .route-loc { font-size:13px; color:var(--text); flex:1; font-weight:500; }
        .route-note { font-size:11px; color:var(--muted); }

        /* ============================================================
           📎 파일 업로드
           ============================================================ */
        .upload-zone {
            border:2px dashed var(--border2); border-radius:var(--r-md); padding:32px 20px;
            text-align:center; cursor:pointer; transition:all .2s; background:var(--bg);
        }
        .upload-zone:hover, .upload-zone.drag { border-color:var(--gold); background:var(--gold-bg); }
        #fileInput { display:none; }
        .file-prev { margin-top:12px; font-size:13px; font-weight:700; color:var(--navy); }

        /* 장표 그리드 */
        .promo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
        .promo-c {
            background:var(--surface); border-radius:var(--r-md); overflow:hidden;
            box-shadow:var(--sh-sm); border:1px solid var(--border); cursor:pointer;
            transition:transform .2s, box-shadow .2s;
        }
        .promo-c:hover { transform:translateY(-3px); box-shadow:var(--sh-lg); }
        .promo-thumb { width:100%; height:128px; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#EEF2F8; }
        .promo-thumb img { width:100%; height:128px; object-fit:cover; }
        .promo-pdf-ico { font-size:46px; background:linear-gradient(135deg,var(--gold-bg),#FAF0CD); width:100%; height:128px; display:flex; align-items:center; justify-content:center; }
        .promo-info { padding:13px; }
        .promo-cat { font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
        .promo-title { font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:3px; line-height:1.35; }
        .promo-period { font-size:11px; color:var(--muted); }

        /* ============================================================
           🪟 모달 (범용)
           ============================================================ */
        .overlay { display:none; position:fixed; inset:0; background:rgba(3,18,43,.72); z-index:998; align-items:center; justify-content:center; padding:16px; }
        .overlay.on { display:flex; }
        .modal { background:var(--surface); border-radius:var(--r-lg); width:100%; max-width:620px; max-height:90vh; overflow:auto; box-shadow:var(--sh-lg); border:1px solid var(--border); }
        .modal-hd { padding:22px 22px 0; display:flex; justify-content:space-between; align-items:center; }
        .modal-hd h3 { font-size:15px; font-weight:800; color:var(--ink); letter-spacing:-.3px; }
        .modal-x { background:none; border:none; font-size:22px; color:var(--muted); cursor:pointer; line-height:1; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .15s; }
        .modal-x:hover { background:var(--bg); color:var(--ink); }
        .modal-body { padding:22px; }

        /* ===== 공지 배너 ===== */
        .notice-banner {
            background: linear-gradient(135deg, var(--navy) 0%, #1A3A6B 100%);
            color: #fff; padding: 11px 18px;
            display: flex; align-items: center; gap: 12px;
            position: sticky; top: 104px; z-index: 198;
            border-bottom: 1px solid rgba(255,255,255,.08);
            animation: slideDown .35s ease both;
        }
        @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        .notice-banner-icon { font-size: 16px; flex-shrink:0; }
        .notice-banner-text { font-size: 13px; font-weight: 600; flex: 1; letter-spacing: -.1px; }
        .notice-banner-close {
            background: rgba(255,255,255,.15); border: none; color: rgba(255,255,255,.8);
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            font-size: 14px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background .15s;
        }
        .notice-banner-close:hover { background: rgba(255,255,255,.28); }

        /* ===== 공지 팝업 모달 ===== */
        .notice-modal-wrap {
            display:none; position:fixed; inset:0; z-index:9000;
            background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
            align-items:center; justify-content:center; padding:20px;
        }
        .notice-modal-wrap.on { display:flex; }
        .notice-modal {
            background:#fff; border-radius:20px; width:100%; max-width:420px;
            overflow:hidden; animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
            box-shadow:0 20px 60px rgba(0,0,0,.3);
        }
        @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
        .notice-modal-header {
            background:linear-gradient(135deg,#03122B,#0C2461);
            padding:24px 24px 20px; color:#fff; position:relative;
        }
        .notice-modal-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(255,255,255,.15); border-radius:20px;
            padding:4px 12px; font-size:12px; font-weight:700; margin-bottom:12px;
        }
        .notice-modal-title { font-size:20px; font-weight:900; line-height:1.4; }
        .notice-modal-date { font-size:11px; color:rgba(255,255,255,.5); margin-top:6px; }
        .notice-modal-body { padding:24px; }
        .notice-modal-content {
            font-size:14px; line-height:1.8; color:#0D1B34;
            white-space:pre-wrap; margin-bottom:20px;
        }
        .notice-modal-footer { display:flex; gap:10px; }
        .notice-modal-footer button { flex:1; padding:13px; border-radius:10px; border:none; cursor:pointer; font-size:14px; font-weight:700; font-family:inherit; }
        .notice-modal-later { background:#F0F2F8; color:#8E9AB5; }
        .notice-modal-confirm { background:#0C2461; color:#fff; }

        /* 공지 목록 (관리자) */
        .notice-item {
            padding:16px; border:1px solid var(--border); border-radius:var(--r-sm);
            margin-bottom:10px; background:var(--bg);
        }
        .notice-item-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .notice-item-title { font-size:14px; font-weight:800; color:var(--ink); }
        .notice-item-date { font-size:11px; color:var(--muted); }
        .notice-item-body { font-size:13px; color:var(--sub); line-height:1.6; white-space:pre-wrap; }

        /* ===== 쪽지 ===== */
        .msg-bubble { border-radius:12px; padding:12px 16px; margin-bottom:10px; max-width:88%; }
        .msg-bubble.sent { background:var(--navy); color:#fff; margin-left:auto; border-bottom-right-radius:4px; }
        .msg-bubble.recv { background:var(--bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
        .msg-meta { font-size:10px; margin-top:6px; opacity:.6; }
        .msg-bubble.sent .msg-meta { text-align:right; }
        .msg-text { font-size:13px; line-height:1.6; white-space:pre-wrap; }
        .msg-bubble.sent .msg-text { color:#fff; }
        .msg-bubble.recv .msg-text { color:var(--ink); }
        .msg-reply-bubble { background:var(--goldBg,#FBF5E6); border:1px solid rgba(184,146,42,.2); border-radius:10px; padding:10px 14px; margin-bottom:6px; }
        .msg-reply-text { font-size:12px; color:var(--gold); line-height:1.5; white-space:pre-wrap; }
        .msg-reply-meta { font-size:10px; color:var(--muted); margin-top:4px; }
        .msg-unread { display:inline-block; width:8px; height:8px; background:#E53E4D; border-radius:50%; margin-left:6px; vertical-align:middle; }

        /* ===== 피드백 ===== */
        .fb-box {
            background: var(--gold-bg); border: 1px solid rgba(184,146,42,.25);
            border-radius: var(--r-sm); padding: 10px 14px; margin-top: 8px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .fb-avatar {
            width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--gold-l), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800; color: var(--ink);
        }
        .fb-content { flex: 1; }
        .fb-meta { font-size: 10.5px; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
        .fb-text { font-size: 13px; color: var(--text); line-height: 1.55; }
        .fb-form { display: flex; gap: 8px; margin-top: 10px; }
        .fb-inp {
            flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
            border-radius: var(--r-sm); font-size: 13px; color: var(--text);
            background: var(--surface); font-family: inherit;
        }
        .fb-inp:focus { outline: none; border-color: var(--gold); }

        /* ===== 주간요약 ===== */
        .week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; margin-bottom: 16px; }
        .week-stat {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r-sm); padding: 14px 12px; text-align: center;

        .sfp-week-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border-radius: var(--r-sm);
            background: var(--bg); border: 1px solid var(--border); margin-bottom: 8px;
        }
        .sfp-week-name { font-size: 13px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
        .sfp-week-nums { display: flex; gap: 16px; }
        .sfp-week-num { text-align: center; }
        .sfp-week-num-v { font-size: 15px; font-weight: 800; color: var(--navy); }
        .sfp-week-num-l { font-size: 10px; color: var(--muted); font-weight: 600; }

        /* ===== 코칭노트 ===== */
        .coaching-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r-md); padding: 20px; margin-bottom: 12px;

        .note-item {

        .note-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
        .note-add-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

        /* ===== 체크리스트 모달 ===== */
        .cl-modal-overlay { display:none; position:fixed; inset:0; background:rgba(3,18,43,.72); z-index:600; align-items:flex-end; justify-content:center; }
        .cl-modal-overlay.on { display:flex; }
        @media(min-width:540px){ .cl-modal-overlay { align-items:center; } }
        .cl-modal { background:var(--surface); border-radius:var(--r-lg) var(--r-lg) 0 0; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; }
        @media(min-width:540px){ .cl-modal { border-radius:var(--r-lg); } }
        .cl-modal-hd { padding:22px 22px 0; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:16px; }
        .cl-modal-title { font-size:15px; font-weight:800; color:var(--ink); }
        .cl-modal-sub { font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; }
        .cl-modal-body { padding:20px 22px 28px; }
        .cl-section { margin-bottom:20px; }
        .cl-section-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
        .cl-chips { display:flex; flex-wrap:wrap; gap:7px; }
        .cl-chip {
            padding:7px 14px; border-radius:20px; border:1.5px solid var(--border);

        .cl-tag { display:inline-flex; align-items:center; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:700; margin:2px 3px 2px 0; }

        .qc-form { display:flex; gap:8px; margin-top:10px; }
        .qc-inp { flex:1; padding:9px 13px; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:13px; color:var(--text); background:var(--surface); font-family:inherit; transition:border-color .18s; }
        .qc-inp:focus { outline:none; border-color:var(--navy); }

        /* 코칭카드 탭 */
        .coaching-tabs { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--r-sm); overflow:hidden; margin-bottom:16px; }
        .coaching-tab { flex:1; padding:9px 0; border:none; cursor:pointer; font-size:12.5px; font-weight:600; transition:all .18s; background:var(--bg); color:var(--muted); font-family:inherit; }
        .coaching-tab.on { background:var(--navy); color:#fff; }

        .route-type { display:inline-flex; align-items:center; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:700; margin-bottom:3px; }
        .rt-meeting  { background:#E8F0FE; color:#1A56DB; }
        .rt-move     { background:#F3F4F6; color:#6B7280; }
        .rt-edu      { background:#FEF3C7; color:#92400E; }
        .rt-internal { background:#EDE9FE; color:#5B21B6; }
        .rt-etc      { background:#F3F4F6; color:#6B7280; }

        /* ===== 고객명 입력란 조건부 표시 ===== */
        .client-field { transition: opacity .2s; }
        .client-field.hidden { opacity:.35; pointer-events:none; }

        /* ============================================================
           📱 반응형
           ============================================================ */
        @media(max-width:480px){
            .app-main { padding:16px 12px 40px; }
            .stat-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
            .grid2 { grid-template-columns:1fr; }
            .login-card { padding:28px 22px; }
        }
    </style>
</head>
<body>

<!-- 로딩 화면 (Firebase 데이터 로드 중) -->
<!-- 공지 팝업 모달 -->
<div class="notice-modal-wrap" id="noticeModal">

<div id="loadingScreen">

    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- ================================================
     🔐 로그인 화면
     
     💡 [코딩 개념 1: HTML 구조]
     - <div>: 박스(컨테이너) 역할
     - id="loginScreen": 이 박스의 고유 이름표
     - JavaScript에서 이 이름으로 요소를 찾아 제어
     ================================================ -->
<div id="loginScreen">
    <div class="login-grid-bg"></div>
    <div class="login-brand">
        <div class="login-logo-ring">
            <div class="login-logo-inner">SL</div>
        </div>
        <h1 class="login-h1">선릉금융 SFP</h1>
        <p class="login-sub">Samsung Life · Seolleung FP</p>
    </div>
    <div class="login-card">
        <!-- 로그인 / 회원가입 탭 토글 -->
        <div class="login-toggle">
            <button id="tabLogin" class="active" onclick="switchAuthTab('login')">로그인</button>
            <button id="tabRegister" onclick="switchAuthTab('register')">계정 만들기</button>
        </div>

        <!-- 로그인 패널 -->
        <div id="panelLogin" class="login-panel on">
            <label class="login-lbl">이름</label>
            <input type="text" id="loginName" class="login-inp" placeholder="이름을 입력하세요" autocomplete="name">
            <label class="login-lbl">비밀번호</label>
            <input type="password" id="loginPw" class="login-inp" placeholder="비밀번호를 입력하세요"
                   onkeydown="if(event.key==='Enter') doLogin()">

        <!-- 회원가입 패널 -->
        <div id="panelRegister" class="login-panel">
            <label class="login-lbl">이름 *</label>
            <input type="text" id="regName" class="login-inp" placeholder="본인 이름 입력">
            <label class="login-lbl">비밀번호 *</label>
            <input type="password" id="regPw" class="login-inp" placeholder="비밀번호 설정">
            <label class="login-lbl">비밀번호 확인 *</label>
            <input type="password" id="regPw2" class="login-inp" placeholder="비밀번호 재입력"
                   onkeydown="if(event.key==='Enter') doRegister()">
            <button class="login-btn" onclick="doRegister()">계정 만들기</button>
            <div id="regErr" class="login-err"></div>
            <div id="regOk" class="login-ok"></div>
        </div>
    </div>
    <div class="login-hint">선릉금융 SFP · Samsung Life Seolleung FP</div>
</div>

<!-- ================================================
     📱 메인 앱 화면 (로그인 후 표시)
     
     💡 왜 처음엔 display:none일까?
     - 로그인 전엔 숨겨두고
     - 로그인 성공 시 JavaScript로 보이게 전환
     ================================================ -->
<div id="appWrap" class="app-wrap">
    <header class="app-hdr">
        <div class="hdr-left">
            <div class="hdr-logo">S</div>
            <div>
                <div id="hdrName" class="hdr-name"></div>
                <div id="hdrRole" class="hdr-role"></div>

    <nav class="tab-nav" id="tabNav"></nav>
    <!-- ② 공지 배너: 관리자가 등록한 최신 공지를 여기에 표시 -->
    <div id="noticeBanner" style="display:none"></div>

<!-- 파일 뷰어 모달 -->
<div class="overlay" id="viewerModal">
    <div class="modal">
        <div class="modal-hd">
            <h3 id="viewerTitle"></h3>
            <button class="modal-x" onclick="closeViewer()">×</button>
        </div>
        <div class="modal-body" id="viewerBody"></div>

</div>

<!-- 체크리스트 모달 -->
<div class="cl-modal-overlay" id="clModal">
    <div class="cl-modal">
        <div class="cl-modal-hd">
            <div>
                <div class="cl-modal-title">📋 미팅 체크리스트</div>
                <div class="cl-modal-sub" id="clModalSub"></div>
            </div>
            <button class="modal-x" onclick="closeChecklist()">×</button>
        </div>
        <div class="cl-modal-body" id="clModalBody"></div>
    </div>
</div>

<script>
// ============================================================
// 🔄 수동 새로고침 — Firebase에서 최신 데이터 다시 로드 후 현재 탭 렌더링
// 자동 재렌더링 대신 사용자가 🔄 버튼으로 직접 새로고침
// ============================================================
window._newDataKeys = new Set();

function updateRefreshBadge() {
    const badge = document.getElementById('refreshBadge');
    if (badge && window._newDataKeys && window._newDataKeys.size > 0) {
        badge.classList.add('on');
    }
}

function manualRefresh() {
    const badge = document.getElementById('refreshBadge');
    if (badge) badge.classList.remove('on');
    if (window._newDataKeys) window._newDataKeys.clear();
    // 현재 탭 재렌더링
    if (window._currentTabId && window._pageMap) {
        const fn = window._pageMap[window._currentTabId];
        const main = document.getElementById('appMain');
        if (fn && main) {
            main.innerHTML = '';
            const wrap = document.createElement('div');
            main.appendChild(wrap);
            fn(wrap);
        }
    }
}
//
// 💡 동작 원리:
// - window._cache: 메모리 캐시 (Firebase에서 로드한 데이터)
// - load(key): 캐시에서 즉시 읽기 (동기)
// - save(key, data): 캐시 즉시 업데이트 + Firestore에 비동기 저장
// - 실시간 리스너: 다른 기기가 저장하면 캐시 자동 업데이트
// ============================================================
const load = k => (window._cache && window._cache[k]) ? window._cache[k] : [];
const save = (k, v) => {
    if (!window._cache) window._cache = {};
    window._cache[k] = v;
    if (window._fsSave) window._fsSave(k, v);
};
const genId   = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fmt     = n => Number(n||0).toLocaleString('ko-KR');

const today     = new Date();
const thisYM    = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
// 💡 toISOString()은 UTC 기준이라 한국(UTC+9)에서 날짜가 밀림 → 로컬 기준으로 수정
const todayStr  = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

// ============================================================
// 💡 [코딩 개념 3: 변수 - 현재 상태 관리]
//
// currentUser = 지금 로그인한 사람의 정보를 담는 변수
// - null: 아무도 로그인 안 한 상태
// - 로그인 성공 시 → {id, name, role, target, ...} 저장
// ============================================================
let currentUser = null;
let pendingFile = null; // 업로드 대기 중인 파일

// ============================================================
// 🏗️ 앱 최초 실행 시 기본 데이터 생성
//
// 💡 왜 이게 필요할까?
// - 처음 파일을 열면 localStorage가 비어있음
// - 관리자 계정이 없으면 아무도 로그인 불가
// - 그래서 기본 관리자 계정을 자동 생성
// ============================================================
function initApp() {
    // 💡 중요: Firebase에서 이미 로드된 데이터가 있으면 절대 덮어쓰지 않음
    // 캐시가 비어있는 것처럼 보여도 Firebase에 실제 데이터가 있을 수 있음
    // → _fsInitDone 플래그로 Firebase 로드 완료 후에만 초기화 여부 판단
    const users = load('sfp_users');
    if (!users.length && window._fsInitDone) {
        // Firebase에도 진짜 없는 경우에만 관리자 계정 생성
        save('sfp_users', [{
            id: 'admin_root',
            name: '관리자',
            password: 'admin1234',
            role: 'admin',
            joinDate: '',
            target: 0
        }]);
    }
}

// ============================================================
// 🔀 로그인 ↔ 회원가입 탭 전환
//
// 💡 classList.toggle : 클래스 붙이고 떼는 방법
// - .on 클래스가 있으면 → display:block (보임)
// - .on 클래스가 없으면 → display:none  (숨김)
// ============================================================
function switchAuthTab(tab) {
    document.getElementById('panelLogin').classList.toggle('on', tab === 'login');
    document.getElementById('panelRegister').classList.toggle('on', tab === 'register');
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('loginErr').textContent = '';
    document.getElementById('regErr').textContent = '';
    document.getElementById('regOk').textContent = '';
}

// ============================================================
// 🆕 회원가입
//
// 💡 핵심 로직:
// 1. 이름 중복 체크 → 같은 이름 있으면 막기
// 2. 비밀번호 확인 → 두 입력이 같은지 비교
// 3. 통과하면 role:'sfp' 로 자동 등록
// 4. 바로 로그인 탭으로 이동
// ============================================================
function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const pw   = document.getElementById('regPw').value;
    const pw2  = document.getElementById('regPw2').value;

    if (!name)         return regErr('이름을 입력해주세요');
    if (!pw)           return regErr('비밀번호를 입력해주세요');
    if (pw.length < 4) return regErr('비밀번호는 4자 이상이어야 합니다');
    if (pw !== pw2)    return regErr('비밀번호가 일치하지 않습니다');

    const btn = document.querySelector('#panelRegister .login-btn');
    if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

    // Firestore에서 이름 중복 직접 확인 후 개별 문서로 저장
    db.collection('sfp_users').where('name', '==', name).get().then(snap => {
        if (!snap.empty) {
            if (btn) { btn.disabled = false; btn.textContent = '계정 만들기'; }
            return regErr('이미 사용 중인 이름입니다');
        }
        const newUser = {
            id: genId(), name, password: pw, role: 'sfp',
            joinDate: todayStr, target: 0, targetTp: 0, targetAct: 0
        };
        // 개별 문서로 저장 → 다른 사람 데이터와 절대 충돌 없음
        return db.collection('sfp_users').doc(newUser.id).set(newUser).then(() => {
            if (!window._cache['sfp_users']) window._cache['sfp_users'] = [];
            window._cache['sfp_users'].push(newUser);

            document.getElementById('regErr').textContent = '';
            document.getElementById('regOk').textContent = `✅ ${name}님 계정이 생성되었습니다! 로그인해주세요`;
            ['regName','regPw','regPw2'].forEach(id => { document.getElementById(id).value = ''; });
            if (btn) { btn.disabled = false; btn.textContent = '계정 만들기'; }
            setTimeout(() => {
                switchAuthTab('login');
                document.getElementById('loginName').value = name;
            }, 1500);
        });
    }).catch(() => {
        if (btn) { btn.disabled = false; btn.textContent = '계정 만들기'; }
        regErr('네트워크 오류가 발생했습니다. 다시 시도해주세요');
    });
}

function regErr(msg) {
    document.getElementById('regErr').textContent = msg;
}

// ============================================================
// 🔐 로그인/로그아웃
//
// 💡 동작 원리:
// 1. users 배열에서 이름이 같은 사람 찾기 (Array.find)
// 2. 비밀번호도 일치하는지 확인
// 3. 맞으면 currentUser에 저장 후 앱 화면 전환
// ============================================================
function doLogin() {
    const name = document.getElementById('loginName').value.trim();
    const pw   = document.getElementById('loginPw').value;
    if (!name || !pw) { loginErr('이름과 비밀번호를 입력해주세요'); return; }

    const btn = document.querySelector('#panelLogin .login-btn');
    if (btn) { btn.disabled = true; btn.textContent = '로그인 중...'; }

    // Firestore에서 직접 이름 조회 → 캐시 타이밍 문제 없음
    db.collection('sfp_users').where('name', '==', name).get().then(snap => {
        if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
        if (snap.empty) { loginErr('이름 또는 비밀번호가 올바르지 않습니다'); return; }

        const user = snap.docs[0].data();
        if (user.password !== pw) { loginErr('이름 또는 비밀번호가 올바르지 않습니다'); return; }

        // 캐시 최신화
        if (!window._cache['sfp_users']) window._cache['sfp_users'] = [];
        const idx = window._cache['sfp_users'].findIndex(u => u.id === user.id);
        if (idx >= 0) window._cache['sfp_users'][idx] = user;
        else window._cache['sfp_users'].push(user);

        currentUser = user;
        window._loggedIn = true;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appWrap').classList.add('on');
        document.getElementById('hdrName').textContent = user.name;
        document.getElementById('hdrRole').textContent = user.role === 'admin' ? '👑 관리자' : '🌱 신인';

        if (user.role === 'admin') buildTabs(ADMIN_TABS, 'dashboard');
        else                       buildTabs(SFP_TABS,   'my_stats');

        showNoticeBanner();
    }).catch(() => {
        if (btn) { btn.disabled = false; btn.textContent = '로그인'; }
        loginErr('네트워크 오류가 발생했습니다. 다시 시도해주세요');
    });
}

function loginErr(msg) {
    document.getElementById('loginErr').textContent = msg;
    setTimeout(() => document.getElementById('loginErr').textContent = '', 3000);
}

function doLogout() {
    currentUser = null; pendingFile = null; window._loggedIn = false;
    document.getElementById('appWrap').classList.remove('on');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginName').value = '';
    document.getElementById('loginPw').value = '';
    document.getElementById('noticeBanner').style.display = 'none';
}

// ============================================================
// 📑 탭 시스템
//
// 💡 배열(Array)로 탭 목록 관리
// - 탭 추가/제거가 쉬워짐
// - .map()으로 배열 → HTML 변환
// ============================================================
const ADMIN_TABS = [
    { id:'dashboard',  label:'📊 대시보드' },
    { id:'weekly',     label:'📅 주간요약' },
    { id:'calendar',   label:'🗓️ 달력' },
    { id:'routes',     label:'🗺️ 일정현황' },
    { id:'members',    label:'🌱 신인관리' },
    { id:'notices',    label:'📢 공지관리' },
    { id:'messages',   label:'✉️ 쪽지함' },
    { id:'coaching',   label:'💬 코칭노트' },
    { id:'consents',   label:'✅ 동의기록' },
    { id:'activities', label:'📋 활동기록' },
    { id:'contracts',  label:'📝 계약기록' },
    { id:'promos',     label:'🏆 장표관리' },
    { id:'export',     label:'📥 내보내기' },
];
const SFP_TABS = [
    { id:'my_stats',    label:'📊 내 실적' },
    { id:'weekly',      label:'📅 주간요약' },
    { id:'calendar',    label:'🗓️ 달력' },
    { id:'my_route',    label:'🗺️ 오늘일정' },
    { id:'my_consent',  label:'✅ 동의입력' },
    { id:'my_contract', label:'📝 계약입력' },
    { id:'my_message',  label:'✉️ 쪽지' },
    { id:'materials',   label:'🏆 자료실' },
];

function buildTabs(tabs, defaultId) {
    document.getElementById('tabNav').innerHTML =
        tabs.map(t => `<button id="tb_${t.id}" class="t-btn" onclick="goTab('${t.id}')">${t.label}</button>`).join('');
    goTab(defaultId);
}

function goTab(id) {
    window._currentTabId = id; // 실시간 리스너가 현재 탭 알 수 있도록
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('on'));
    const btn = document.getElementById(`tb_${id}`);
    if (btn) btn.classList.add('on');

    const main = document.getElementById('appMain');
    main.innerHTML = '';
    const wrap = document.createElement('div');
    main.appendChild(wrap);

    // 💡 객체(Object)로 함수 매핑 - id에 맞는 함수를 바로 찾아서 실행
    const pages = {
        dashboard: pgDashboard, members: pgMembers,
        consents: pgConsents,   activities: pgActivities,
        contracts: pgContracts, promos: pgPromos, export: pgExport,
        calendar: pgCalendar,   routes: pgRoutes,
        weekly: pgWeekly,       coaching: pgCoaching,
        notices: pgNotices,     messages: pgMessages,
        my_stats: pgMyStats,    my_consent: pgMyConsent,
        my_activity: pgMyActivity, my_contract: pgMyContract,
        my_message: pgMyMessage,
        materials: pgMaterials, my_route: pgMyRoute
    };
    window._pageMap = pages; // 실시간 리스너가 현재 탭 새로고침에 사용
    if (pages[id]) pages[id](wrap);
}

const uMap = () => Object.fromEntries(load('sfp_users').map(u => [u.id, u.name]));
const sfpList = () => load('sfp_users').filter(u => u.role === 'sfp');
const sfpOpts = () => sfpList().map(u => `<option value="${u.id}">${u.name}</option>`).join('');
const allOpts = () => `<option value="">전체 SFP</option>` + sfpOpts();

function delRec(key, id, cb) {
    if (!confirm('삭제하시겠습니까?')) return;
    // 캐시에서 즉시 제거
    window._cache[key] = (window._cache[key] || []).filter(r => r.id !== id);
    // Firestore에서 직접 삭제 → 리스너가 감지해서 신인 화면에도 즉시 반영
    db.collection(key).doc(String(id)).delete()
        .catch(e => console.warn('삭제 오류:', e));
    if (cb) cb();
}

function pgDashboard(el) {

    const selectedYM = el.dataset.dashYM || thisYM;
    renderDashboard(el, selectedYM);

function renderDashboard(el, ym) {
    el.dataset.dashYM = ym;
    const [ymYear, ymMon] = ym.split('-').map(Number);
    const labelYM = `${ymYear}년 ${ymMon}월`;

    const contracts  = load('sfp_contracts').filter(c => c.date?.startsWith(ym));
    const activities = load('sfp_activities').filter(a => a.date?.startsWith(ym));
    const consents   = load('sfp_consents').filter(c => c.date?.startsWith(ym));
    const premium    = contracts.reduce((s,c) => s+(c.premium||0), 0);
    const totalTp    = contracts.reduce((s,c) => s+(c.tp||0), 0);
    const members    = sfpList();

    // 선택 가능한 월 목록 (데이터 있는 월 + 최근 12개월)
    const allDates = [
        ...load('sfp_contracts').map(c=>c.date?.slice(0,7)),
        ...load('sfp_activities').map(a=>a.date?.slice(0,7)),
        ...load('sfp_consents').map(c=>c.date?.slice(0,7)),
    ].filter(Boolean);
    const monthSet = new Set(allDates);
    // 최근 12개월 항상 포함
    for (let i=0; i<12; i++) {
        const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
        monthSet.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    const months = [...monthSet].sort((a,b)=>b.localeCompare(a));

    el.innerHTML = `
    <div class="sec-hd">
        <h2>팀 실적 현황</h2>
        <select class="inp" style="font-size:12px;padding:5px 10px;height:auto;width:auto"
            onchange="renderDashboard(this.closest('[data-dash-y-m]')||document.getElementById('appMain').firstChild, this.value)">
            ${months.map(m => `<option value="${m}" ${m===ym?'selected':''}>${m.replace('-','년 ')}월</option>`).join('')}
        </select>
    </div>
    <div class="stat-grid">
        ${[
            {l:`${labelYM} 계약`, v:contracts.length,   u:'건', c:'var(--gold)'},
            {l:'고객미팅',        v:activities.length,  u:'건', c:'var(--blue)'},
            {l:'컨설팅 동의',     v:consents.length,    u:'건', c:'var(--green)'},
            {l:'총 보험료',       v:fmt(premium),       u:'원', c:'var(--navy)'},
            {l:'총 환산TP',       v:String(totalTp),    u:'',   c:'var(--gold)'},
        ].map(s => `<div class="stat-card" style="--accent-color:${s.c}">
            <div class="stat-lbl">${s.l}</div>
            <div class="stat-v" style="color:${s.c};font-size:${String(s.v).length>7?'16px':'24px'}">${s.v}<span style="font-size:12px;font-weight:500;margin-left:2px">${s.u}</span></div>
        </div>`).join('')}
    </div>
    <div class="card">
        <div class="card-hd">👤 신인별 실적 <span style="font-size:11px;color:var(--muted);font-weight:400">${labelYM} 기준</span></div>
        <div class="sfp-grid">
            ${members.length ? members.map(m => {
                const mc       = contracts.filter(c=>c.userId===m.id);
                const curTp    = mc.reduce((s,c)=>s+(c.tp||0),0);
                const curAct   = activities.filter(a=>a.userId===m.id).length;
                const tpRate   = m.targetTp  > 0 ? Math.round(curTp /m.targetTp *100) : 0;
                const actRate  = m.targetAct > 0 ? Math.round(curAct/m.targetAct*100) : 0;
                const tpColor  = tpRate >=100?'var(--success)':tpRate >=60?'var(--warning)':'var(--danger)';
                const actColor = actRate>=100?'var(--success)':actRate>=60?'var(--warning)':'var(--danger)';
                const tpPc     = tpRate >=100?'pg':tpRate >=60?'pm':'pl';
                const actPc    = actRate>=100?'pg':actRate>=60?'pm':'pl';
                return `<div class="sfp-c">
                    <div class="sfp-cn">

                    <div style="text-align:right;font-size:11px;font-weight:800;color:${m.targetTp>0?tpColor:'var(--muted)'};margin-bottom:10px">${m.targetTp>0?tpRate+'%':'-'}</div>

                    <div style="text-align:right;font-size:11px;font-weight:800;color:${m.targetAct>0?actColor:'var(--muted)'};margin-bottom:10px">${m.targetAct>0?actRate+'%':'-'}</div>

// 목표 수정 (관리자 전용) - 환산TP + 활동량
function updateTarget(id) {
    const tp  = parseFloat(document.getElementById(`tp_${id}`)?.value) || 0;
    const act = parseInt(document.getElementById(`act_${id}`)?.value)  || 0;
    // 개별 문서 업데이트 → 다른 유저 데이터에 영향 없음
    db.collection('sfp_users').doc(String(id)).update({
        targetTp: tp, targetAct: act, target: act
    }).then(() => {
        const users = load('sfp_users');
        const u = users.find(u => u.id === id);
        if (u) { u.targetTp = tp; u.targetAct = act; u.target = act; }
        alert(`✅ 목표 저장 완료\n환산TP: ${tp}  /  활동량: ${act}건`);
        goTab('members');
    }).catch(e => {
        console.warn(e);
        alert('저장 중 오류가 발생했습니다');
    });
}

function delMember(id) {
    if (!confirm('삭제 시 관련 기록도 함께 삭제됩니다. 계속할까요?')) return;
    db.collection('sfp_users').doc(String(id)).delete().then(() => {
        window._cache['sfp_users'] = load('sfp_users').filter(u => u.id !== id);
        goTab('members');
    });
}

function changePw(id) {
    const np = document.getElementById(`np_${id}`)?.value;
    if (!np) return alert('새 비밀번호를 입력해주세요');
    db.collection('sfp_users').doc(String(id)).update({ password: np }).then(() => {
        const users = load('sfp_users');
        const u = users.find(u => u.id === id);
        if (u) u.password = np;
        alert('비밀번호가 변경되었습니다');
        goTab('members');
    });
}

function pgConsents(el) {
    el.innerHTML = `<div class="sec-hd"><h2>동의 기록</h2></div>` + consentFormHtml(true);
    const td = document.createElement('div'); td.className='card';
    td.innerHTML=`<div class="card-hd">📋 동의 목록</div>
        <div class="fbar">
            <select id="fcU" class="inp" onchange="refreshConsents()">${allOpts()}</select>
            <input type="month" id="fcM" class="inp" value="${thisYM}" onchange="refreshConsents()">
        </div><div id="cTA"></div>`;
    el.appendChild(td); refreshConsents();
}

function refreshConsents() {
    const fu=document.getElementById('fcU')?.value||'', fm=document.getElementById('fcM')?.value||'';
    let d=load('sfp_consents');
    if(fu) d=d.filter(c=>c.userId===fu);
    if(fm) d=d.filter(c=>c.date?.startsWith(fm));
    d.sort((a,b)=>b.date.localeCompare(a.date));
    const um=uMap();
    document.getElementById('cTA').innerHTML = d.length
        ? `<div class="tw"><table><thead><tr><th>날짜</th><th>SFP</th><th>고객명</th><th>유형</th><th>메모</th><th></th></tr></thead><tbody>
            ${d.map(c=>`<tr><td>${c.date}</td><td><strong>${um[c.userId]||'?'}</strong></td><td>${c.client}</td>
            <td><span class="badge bi">${c.type}</span></td><td>${c.note||'-'}</td>
            <td><button class="btn btn-d btn-sm" onclick="delRec('sfp_consents','${c.id}',refreshConsents)">삭제</button></td></tr>`).join('')}
            </tbody></table></div>`
        : `<div class="empty"><div class="empty-ico">✅</div><div>기록이 없습니다</div></div>`;
}

function submitConsent(isAdmin) {
    const uid=isAdmin?document.getElementById('cU')?.value:currentUser.id;
    const cl=document.getElementById('cCl').value.trim();
    const ty=document.getElementById('cTy').value;
    const dt=document.getElementById('cDt').value;
    const no=document.getElementById('cNo').value.trim();
    if(!uid) return alert('SFP를 선택해주세요');
    if(!cl)  return alert('고객명을 입력해주세요');
    if(!dt)  return alert('날짜를 입력해주세요');
    const d=load('sfp_consents');
    d.push({id:genId(),userId:uid,client:cl,type:ty,date:dt,note:no});
    save('sfp_consents',d);
    document.getElementById('cCl').value='';
    document.getElementById('cNo').value='';
    if(isAdmin) refreshConsents();
    else { goTab('my_consent'); }
    alert('✅ 동의 기록 추가 완료');
}

// ============================================================
// 🏆 장표 관리 (관리자 업로드)
//
// 💡 [코딩 개념 4: 파일 처리 - FileReader + base64]
//
// 이미지/PDF를 localStorage에 저장하는 방법:
// 1. 사용자가 파일 선택 (input[type=file])
// 2. FileReader가 파일을 base64 텍스트로 변환
// 3. base64 텍스트를 localStorage에 저장
// 4. 불러올 때 <img src="base64문자열"> 로 표시
//
// base64 = 파일(이진데이터)을 텍스트로 변환한 것
// 예: 이미지 → "data:image/jpg;base64,/9j/4AAQ..."
//
// ⚠️ 제한: 파일당 4MB 이하, localStorage 총 5MB
// ============================================================
function pgPromos(el) {
    el.innerHTML = `
    <div class="sec-hd"><h2>장표 관리</h2></div>
    <div class="card" style="text-align:center;padding:30px">
        <div style="font-size:13px;color:var(--muted)">장표 불러오는 중...</div>
    </div>`;
    // 장표는 용량이 커서 탭 열 때 로드
    window._fsLoad('sfp_promos').then(() => {
        window._fsListen('sfp_promos');
        _renderPromoPage(el);
    });
}

function _renderPromoPage(el) {
    el.innerHTML = `
    <div class="sec-hd"><h2>장표 관리</h2></div>
    <div class="card">
        <div class="card-hd">📤 장표 업로드</div>
        <div class="grid2">
            <div class="fg"><label class="lbl">제목 *</label><input id="ptTitle" class="inp" placeholder="예: 3월 건강보험 집중 프로모션"></div>
            <div class="fg"><label class="lbl">구분</label>
                <select id="ptCat" class="inp"><option>프로모션</option><option>장표</option><option>공지</option><option>교육자료</option><option>이슈</option></select>
            </div>
            <div class="fg"><label class="lbl">기간/날짜</label><input id="ptPeriod" class="inp" placeholder="예: 3/1 ~ 3/31"></div>
        </div>
        <label class="lbl" style="margin-bottom:8px;display:block">이미지 선택 (슬롯 탭해서 각각 선택 · 최대 3장)</label>
        <div style="display:flex;gap:8px;margin-bottom:14px">
            ${[1,2,3].map(n => `
            <div style="flex:1">
                <div id="slot${n}" onclick="document.getElementById('fi${n}').click()"
                    style="height:88px;background:var(--bg);border:2px dashed var(--border);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;-webkit-tap-highlight-color:transparent">
                    <span style="font-size:26px">📷</span>
                    <span style="font-size:11px;color:var(--muted);margin-top:3px">${n}번</span>
                </div>
                <input type="file" id="fi${n}" accept="image/*,.pdf" style="display:none" onchange="onSlotSelect(${n}, this.files[0])">
            </div>`).join('')}
        </div>
        <button class="btn btn-p" style="width:100%;justify-content:center" onclick="uploadPromo()">📤 업로드</button>
    </div>
    <div class="card">
        <div class="card-hd">📚 업로드된 장표 목록</div>
        <div id="promoGridArea"></div>
    </div>`;
    pendingFiles = [null, null, null];
    renderPromoGrid(true);
}

function onFileDrop(e) { e.preventDefault(); }

let pendingFiles = [null, null, null];

function onSlotSelect(n, file) {
    if (!file) return;
    if (file.size > 4*1024*1024) { alert('파일 크기는 4MB 이하여야 합니다'); return; }
    if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
        alert('이미지(JPG/PNG/GIF) 또는 PDF만 가능합니다'); return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
        pendingFiles[n-1] = { data: ev.target.result, type: file.type==='application/pdf'?'pdf':'image', name: file.name };
        const slot = document.getElementById('slot' + n);
        if (file.type.startsWith('image/')) {
            slot.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:88px;object-fit:cover">`;
        } else {
            slot.innerHTML = `<span style="font-size:22px">📄</span><span style="font-size:10px;color:var(--sub);margin-top:3px;text-align:center;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${file.name}</span>`;
        }
        slot.style.borderColor = 'var(--gold)';
        slot.style.background  = 'var(--gold-bg)';
    };
    reader.readAsDataURL(file);
}

function uploadPromo() {
    const title  = document.getElementById('ptTitle').value.trim();
    const cat    = document.getElementById('ptCat').value;
    const period = document.getElementById('ptPeriod').value.trim();
    if (!title) return alert('제목을 입력해주세요');
    const selected = (pendingFiles||[]).filter(f => f !== null);
    if (!selected.length) return alert('사진을 1장 이상 선택해주세요');

    const d = load('sfp_promos');
    selected.forEach((f, i) => {
        const itemTitle = selected.length > 1 ? title + ' (' + (i+1) + ')' : title;
        d.unshift({ id:genId(), title:itemTitle, cat, period, data:f.data, type:f.type, name:f.name, uploadedAt:todayStr });
    });
    save('sfp_promos', d);

    const cnt = selected.length;
    pendingFiles = [null, null, null];
    document.getElementById('ptTitle').value = '';
    document.getElementById('ptPeriod').value = '';
    [1,2,3].forEach(n => {
        const slot = document.getElementById('slot' + n);
        if (slot) {
            slot.innerHTML = '<span style="font-size:26px">📷</span><span style="font-size:11px;color:var(--muted);margin-top:3px">' + n + '번</span>';
            slot.style.borderColor = 'var(--border)';
            slot.style.background  = 'var(--bg)';
        }
        const fi = document.getElementById('fi' + n);
        if (fi) fi.value = '';
    });
    renderPromoGrid(true);
    alert('📤 ' + cnt + '장 업로드 완료!');
}

function renderPromoGrid(isAdmin) {
    const data = load('sfp_promos');
    const area = document.getElementById('promoGridArea');
    if (!area) return;

    // 업로드 월 목록 추출 (최신순)
    const months = [...new Set(data.map(p => (p.uploadedAt||'').slice(0,7)))]
        .filter(Boolean).sort((a,b) => b.localeCompare(a));

    // 현재 선택된 월 (없으면 전체)
    const selectedMonth = area.dataset.month || 'all';

    const filtered = selectedMonth === 'all'
        ? data
        : data.filter(p => (p.uploadedAt||'').startsWith(selectedMonth));

    const catColor = {프로모션:'bg_', 장표:'bi', 공지:'bd', 교육자료:'bs', 이슈:'bw'};

    // 월 필터 탭
    const tabsHtml = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <button onclick="setPromoMonth('all')"
            style="padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;
            background:${selectedMonth==='all'?'var(--navy)':'var(--bg)'};
            color:${selectedMonth==='all'?'#fff':'var(--sub)'};
            border:1.5px solid ${selectedMonth==='all'?'var(--navy)':'var(--border)'}">
            전체 (${data.length})
        </button>
        ${months.map(m => `
        <button onclick="setPromoMonth('${m}')"
            style="padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;
            background:${selectedMonth===m?'var(--navy)':'var(--bg)'};
            color:${selectedMonth===m?'#fff':'var(--sub)'};
            border:1.5px solid ${selectedMonth===m?'var(--navy)':'var(--border)'}">
            ${m.replace('-','년 ')}월 (${data.filter(p=>(p.uploadedAt||'').startsWith(m)).length})
        </button>`).join('')}
    </div>`;

    area.innerHTML = tabsHtml + (filtered.length
        ? `<div class="promo-grid">${filtered.map(p => `
            <div class="promo-c">
                <div onclick="viewPromo('${p.id}')">
                    <div class="promo-thumb">
                        ${p.type==='image'
                            ? `<img src="${p.data}" alt="${p.title}" loading="lazy">`
                            : `<div class="promo-pdf-ico">📄</div>`}
                    </div>
                    <div class="promo-info">
                        <div class="promo-cat"><span class="badge ${catColor[p.cat]||'bg_'}">${p.cat}</span></div>
                        <div class="promo-title">${p.title}</div>
                        <div class="promo-period">${p.period?'📅 '+p.period:''} ${p.uploadedAt||''}</div>
                    </div>
                </div>
                ${isAdmin?`<div style="padding:0 12px 12px"><button class="btn btn-d btn-sm" onclick="delPromo('${p.id}')">삭제</button></div>`:''}
            </div>`).join('')}
        </div>`
        : `<div class="empty"><div class="empty-ico">📎</div><div>해당 월에 업로드된 장표가 없습니다</div></div>`);
}

function setPromoMonth(month) {
    const area = document.getElementById('promoGridArea');
    if (!area) return;
    area.dataset.month = month;
    const isAdmin = currentUser && currentUser.role === 'admin';
    renderPromoGrid(isAdmin);
}

function viewPromo(id) {
    const p = load('sfp_promos').find(p=>p.id===id);
    if (!p) return;
    document.getElementById('viewerTitle').textContent = p.title;
    const body = document.getElementById('viewerBody');
    if (p.type==='image') {
        body.innerHTML = `<img src="${p.data}" style="max-width:100%;height:auto;border-radius:10px">`;
    } else {
        body.innerHTML = `
            <p style="font-size:13px;color:var(--muted);margin-bottom:14px">PDF 파일입니다. 아래 버튼으로 열어보세요.</p>
            <button class="btn btn-p" onclick="window.open('${p.data}','_blank')">📄 새 탭에서 PDF 열기</button>
            <iframe src="${p.data}" width="100%" height="480px" style="border:none;border-radius:10px;margin-top:14px" title="${p.title}"></iframe>`;
    }
    document.getElementById('viewerModal').classList.add('on');
}
function closeViewer() { document.getElementById('viewerModal').classList.remove('on'); }

function delPromo(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    save('sfp_promos', load('sfp_promos').filter(p=>p.id!==id));
    renderPromoGrid(true);
}

            <div>👤 <strong>인원별종합</strong> — 환산TP·활동·동의·계약·달성률 한눈에</div>
            <div>🔍 <strong>고객별상세</strong> — 고객 기준 동의·활동·계약 통합</div>
